<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Kai Breakout</title>
  <!--
    Backward-compat redirect. The game USED to live at /kai-breakout.html;
    starting v12.1 it lives at the repo root (index.html) so the URL is just
    `/Kai-Breakout/` without the ugly second "kai-breakout". This file
    redirects any old bookmarks / installed PWA shortcuts that still point
    at /kai-breakout.html back to the root. After most users have hit this
    once, this file can eventually be deleted from the repo.

    Do NOT put game code here. Edit `index.html` instead.
  -->
  <meta http-equiv="refresh" content="0; url=./">
  <link rel="canonical" href="./">
  <link rel="apple-touch-icon-precomposed" href="webapp icon.png">
  <link rel="icon" href="webapp icon.png">
  <script>
    // replace() avoids adding a history entry — pressing "back" goes to wherever
    // the user came from, not back to this redirect page.
    window.location.replace('./');
  </script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a1230; color: #c8e8ff;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    a { color: #5bd2ff; }
  </style>
</head>
<body>
  <p>Loading <a href="./">Kai Breakout</a>&hellip;</p>
</body>
</html>
