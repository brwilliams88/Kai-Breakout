    canvasFlashColor = kind === 'madmama'  ? 'rgba(255, 60, 30, 0.32)' :
                       kind === 'nozomi'   ? 'rgba(255, 110, 200, 0.32)' :
                       kind === 'superKai' ? 'rgba(80, 240, 100, 0.32)' :
                       kind === 'papa'     ? 'rgba(91, 210, 255, 0.34)' :
                       kind === 'akhil'    ? 'rgba(255, 220, 60, 0.34)' :
                                             'rgba(255, 255, 255, 0.25)';
  }

  // ---------- Perimeter math for snake paddle ----------
  function perimToXY(t) {
    const w = W - 2 * PERIM_INSET;
    const h = H - 2 * PERIM_INSET;
    const totalTop = w;
    const totalRight = totalTop + h;
    const totalBottom = totalRight + w;
    const total = totalBottom + h;
    t = ((t % total) + total) % total;
    if (t < totalTop)    return { x: PERIM_INSET + t,                  y: PERIM_INSET };
    if (t < totalRight)  return { x: W - PERIM_INSET,                  y: PERIM_INSET + (t - totalTop) };
    if (t < totalBottom) return { x: W - PERIM_INSET - (t - totalRight), y: H - PERIM_INSET };
                         return { x: PERIM_INSET,                        y: H - PERIM_INSET - (t - totalBottom) };
  }

  function showBanner(msg, sub) {
    banner.innerHTML = msg + (sub ? `<small>${sub}</small>` : '');
    banner.style.display = 'block';
  }
  function hideBanner() { banner.style.display = 'none'; }

  // ---------- Input ----------
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    state.paddleX = Math.max(0, Math.min(W - paddleW(), x - paddleW()/2));
    if (state.ball.stuck) state.ball.x = state.paddleX + paddleW()/2;
  });
  function setPaused(p) { state.paused = p; }
  // ---------- Pause button (top-right corner of canvas) ----------
  const PAUSE_BTN = { size: 44, pad: 12 };
  function pauseBtnRect() {
    return { x: W - PAUSE_BTN.size - PAUSE_BTN.pad, y: PAUSE_BTN.pad, s: PAUSE_BTN.size };
  }
  function isInPauseButton(cx, cy) {
    const r = pauseBtnRect();
    return cx >= r.x && cx <= r.x + r.s && cy >= r.y && cy <= r.y + r.s;
  }
  function canPause() {
    return gameStarted && !state.over && !state.won && !state.levelTransitioning;
  }
  function drawPauseButton() {
    if (!canPause()) return;
    const r = pauseBtnRect();
    ctx.save();
    ctx.fillStyle = 'rgba(15, 22, 50, 0.78)';
    ctx.strokeStyle = 'rgba(91, 210, 255, 0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(r.x, r.y, r.s, r.s, 9);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#9ad7ff';
    ctx.shadowColor = 'rgba(91, 210, 255, 0.55)';
    ctx.shadowBlur = 8;
    if (state.paused) {
      // Play icon (triangle)
      ctx.beginPath();
      ctx.moveTo(r.x + 15, r.y + 11);
      ctx.lineTo(r.x + 15, r.y + r.s - 11);
      ctx.lineTo(r.x + r.s - 11, r.y + r.s/2);
      ctx.closePath();
      ctx.fill();
    } else {
      // Pause icon (two bars)
      ctx.fillRect(r.x + 13, r.y + 11, 6, r.s - 22);
      ctx.fillRect(r.x + r.s - 19, r.y + 11, 6, r.s - 22);
    }
    ctx.restore();
  }

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  state.keys.left  = true;
    if (e.key === 'ArrowRight') state.keys.right = true;
    if (e.key === 'p' || e.key === 'P') {
      if (!state.ball.stuck && !state.over && !state.won) setPaused(!state.paused);
    }
    // (M key mute removed per request — game audio plays unmuted.)
    // Debug / testing: spawn specific items instantly.
    //  '1' = SUPERKAI, '2' = PAPA, '3' = AKHIL, '4' = MAD MAMA, '5' = NOZOMI
    function modeBlocked() {
      return state.fallingItem || state.nozomi.active || state.madMama.active
          || state.superKai.active || state.papa.active || state.akhil.active
          || state.over || state.won;
    }
    if (e.key === '1' && !modeBlocked()) spawnFallingItem('superKai');
    if (e.key === '2' && !modeBlocked()) spawnFallingItem('papa');
    if (e.key === '3' && !modeBlocked()) spawnFallingItem('akhil');
    if (e.key === '4' && !modeBlocked()) spawnFallingItem('bomb');
    if (e.key === '5' && !modeBlocked()) spawnFallingItem('heart');
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (!gameStarted) { dismissTitle(); return; }
      // Level complete popup → next level
      if (state.levelTransitioning) { advanceToNextLevel(); return; }
      if (state.over || state.won) { restart(); return; }
      if (e.key !== ' ') return;  // Enter doesn't launch/pause, only space does
      if (state.ball.stuck) launchBall();
      else setPaused(!state.paused);
    }
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft')  state.keys.left  = false;
    if (e.key === 'ArrowRight') state.keys.right = false;
  });
  // ---------- Logo tap → spawn an item (cheat / touch-testing) ----------
  // Tap the Kai Breakout logo N times within ~800 ms of the last tap to spawn:
  //   1 = SUPERKAI, 2 = PAPA, 3 = AKHIL, 4 = MAD MAMA, 5 = NOZOMI
  // Each tap also pulses the logo so the player gets visual feedback while
  // counting taps. The counter resets if you stop tapping (or after 5).
  (function setupLogoTapSpawn() {
    const logoEl = document.getElementById('logo');
    if (!logoEl) return;
    let taps = 0;
    let resetTimer = null;
    const ITEM_BY_TAP = ['superKai', 'papa', 'akhil', 'bomb', 'heart']; // index 0..4 = 1..5 taps
    function fire() {
      // Don't spawn during title or game-over/win/level-transition or while another mode is up.
      if (!gameStarted) return;
      if (state.fallingItem || state.nozomi.active || state.madMama.active
          || state.superKai.active || state.papa.active || state.akhil.active
          || state.over || state.won || state.levelTransitioning) return;
      const t = Math.min(taps, ITEM_BY_TAP.length);
      if (t >= 1) spawnFallingItem(ITEM_BY_TAP[t - 1]);
    }
    function onTap(ev) {
      // Stop default to avoid the touchstart-then-click double-fire on mobile.
      ev.preventDefault();
      taps++;
      // Pulse animation
      logoEl.classList.remove('tap-pulse');
      // Force reflow so the class re-applies (otherwise back-to-back taps don't pulse).
      void logoEl.offsetWidth;
      logoEl.classList.add('tap-pulse');
      setTimeout(() => logoEl.classList.remove('tap-pulse'), 140);
      // 5 taps = top tier — fire immediately.
      if (taps >= 5) {
        fire();
        taps = 0;
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = null;
        return;
      }
      // Otherwise wait for the idle window to close, then fire whatever taps we got.
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        fire();
        taps = 0;
        resetTimer = null;
      }, 800);
    }
    logoEl.addEventListener('click', onTap);
    // Touch: handle on touchstart for snappy feedback; also preventDefault to
    // suppress the synthetic click that would otherwise double-count.
    logoEl.addEventListener('touchstart', onTap, { passive: false });
  })();
  // Helper: convert mouse event to canvas-space coords (matches touch handler logic).
  function mousePosToCanvas(ev) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (ev.clientX - rect.left) * (W / rect.width),
      y: (ev.clientY - rect.top)  * (H / rect.height),
    };
  }
  canvas.addEventListener('click', ev => {
    if (!gameStarted) { dismissTitle(); return; }
    // Pause button hit?
    const p = mousePosToCanvas(ev);
    if (canPause() && isInPauseButton(p.x, p.y)) {
      setPaused(!state.paused);
      return;
    }
    if (state.ball.stuck) launchBall();
  });

  // ---------- Touch controls (mobile / iPad) ----------
  // Touching anywhere sets a TARGET x; the paddle slides toward it at a fixed
  // speed per tick (no teleport). Dragging continuously updates the target so
  // the paddle still tracks the finger.
  //   • Tap (no movement, low Y) during gameplay = launches a stuck ball,
  //     advances level-complete screen, or dismisses title/endgame.
  //   • Tap (no movement, HIGH Y — top 60% of canvas) during active play = pause.
  state.touchTargetX = null;
  let touchStartX = 0, touchStartY = 0, touchMoved = false;
  let touchOnPauseBtn = false;
  function touchPosToCanvas(touch) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (touch.clientX - rect.left) * (W / rect.width),
      y: (touch.clientY - rect.top)  * (H / rect.height),
    };
  }
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    if (!t) return;
    touchStartX = t.clientX;  touchStartY = t.clientY;  touchMoved = false;
    const p = touchPosToCanvas(t);
    // If the tap lands inside the pause button area, treat it as a button press —
    // don't steer the paddle toward the corner.
    touchOnPauseBtn = canPause() && isInPauseButton(p.x, p.y);
    if (!touchOnPauseBtn) state.touchTargetX = p.x - paddleW()/2;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    if (!t) return;
    if (Math.abs(t.clientX - touchStartX) > 8 || Math.abs(t.clientY - touchStartY) > 8) touchMoved = true;
    if (touchOnPauseBtn) return;  // pause-button press — don't move paddle while finger drags
    const p = touchPosToCanvas(t);
    state.touchTargetX = p.x - paddleW()/2;
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    state.touchTargetX = null;  // stop sliding paddle
    // Pause-button tap: release within button, no significant drag → toggle pause.
    if (touchOnPauseBtn) {
      touchOnPauseBtn = false;
      if (!touchMoved) { setPaused(!state.paused); return; }
      return;
    }
    if (touchMoved) return;
    // It was a tap, not a drag. Figure out what to do.
    if (!gameStarted) { dismissTitle(); return; }
    if (state.levelTransitioning) { advanceToNextLevel(); return; }
    if (state.over || state.won) { restart(); return; }
    if (state.ball.stuck) { launchBall(); return; }
    // Pause is now triggered by the dedicated corner button — no canvas-tap pause.
  }, { passive: false });

  function restart() {
    state.score = 0; state.lives = 3; state.over = false; state.won = false;
    setScore(0); setLives(3);
    state.fallingItem = null;
    state.nozomi.active = false;
    state.madMama.active = false;
    state.superKai.active = false;
    state.papa.active = false;
    state.akhil.active = false;
    state.extras.length = 0;
    state.particles.length = 0;
    state.explosionParts.length = 0;
    state.popups.length = 0;
    state.snowHearts.length = 0;
    stopNozomiMusic();
    stopMadMamaMusic();
    stopSuperKaiMusic();
    stopPapaMusic();
    stopAkhilMusic();
    stopChillMusic();
    state.activeTicks = 0;
    state.nextSpawnTick = SPAWN_INTERVAL_TICKS;
    state.ball.lastPaddleHitTick = 0;
    state.combo = 0;
    state.levelTransitioning = false;
    state.levelBrickPoints = 0;
    prevHighScore = highScore;
    hideLevelComplete();
    hideEndgame();
    startLevel(1);
  }

  // ---------- Physics ----------
  function ballRadius() {
    if (state.nozomi.active)   return BALL_R * 2;
    if (state.madMama.active)  return Math.round(BALL_R * 1.5);
    if (state.superKai.active) return Math.round(BALL_R * 1.23);
    if (state.akhil.active)    return Math.round(BALL_R * 1.23);
    return BALL_R;
  }
  // Damage a brick. For normal/tough bricks, decrement hp; if it hits 0, destroy.
  // For steel: destroy only if `force` is true (MAD MAMA explosions).
  // Returns true if the brick was destroyed THIS call.
  function damageBrick(b, opts) {
    opts = opts || {};
    if (!b.alive) return false;
    if (b.kind === 'steel' && !opts.force) {
      // No damage, no points, no destruction — just a metallic clang.
      playSteelClang();
      return false;
    }
    if (opts.force) {
      // Force mode (Nozomi pass-through or MAD MAMA explosion) destroys any brick in one hit.
      b.hp = 0;
    } else {
      b.hp--;
    }
    if (b.hp > 0) {
      // Still alive (tough brick with crack). Small sparkle + crack sound.
      spawnBrickParticles(b, 4);
      playToughCrack();
      return false;
    }
    // Destroyed
    b.alive = false;
    // Combo multiplier: 3+ = 2x, 10+ = 3x
    state.combo++;
    let mult = 1;
    if (state.combo >= 10)     mult = 3;
    else if (state.combo >= 3) mult = 2;
    const points = 10 * state.level * mult;
    state.score += points;
    state.levelBrickPoints += points;
    setScore(state.score);
    if (opts.useExplosion) spawnExplosion(b);
    else                   spawnBrickParticles(b);
    spawnScorePopup(b, points);
    // Milestone combo banners
    if (state.combo === 3 || state.combo === 10) {
      state.popups.push({
        x: b.x + b.w/2, y: b.y - 14,
        text: (mult) + 'x COMBO!',
        color: state.combo === 10 ? '#ff6fa8' : '#ffd76b',
        life: 70, maxLife: 70
      });
    }
    return true;
  }
  // Compat shim — kept so legacy call sites that say clearBrick still work.
  function clearBrick(b, useExplosion) {
    return damageBrick(b, { useExplosion, force: true });
  }
  // 8-way adjacency: bricks whose center is within ~1.3 brick-widths horizontally
  // and ~1.6 brick-heights vertically of the seed brick.
  function adjacentBricks(b) {
    const adj = [];
    for (const o of state.bricks) {
      if (!o.alive || o === b) continue;
      const dx = (o.x + o.w/2) - (b.x + b.w/2);
      const dy = (o.y + o.h/2) - (b.y + b.h/2);
      if (Math.abs(dx) < b.w * 1.3 && Math.abs(dy) < b.h * 1.7) adj.push(o);
    }
    return adj;
  }

  function update(dt) {
    if (!gameStarted || state.paused || state.over || state.won || state.levelTransitioning) return;
    state.activeTicks++;
    if (canvasFlash > 0) canvasFlash--;

    // --- Particles ---
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.18; p.vx *= 0.97;
      p.life--;
      if (p.life <= 0) state.particles.splice(i, 1);
    }
    // --- Explosion particles (shockwave / flash / fire / spark / smoke) ---
    for (let i = state.explosionParts.length - 1; i >= 0; i--) {
      const p = state.explosionParts[i];
      if (p.kind === 'shock') {
        p.size += p.growth;
      } else if (p.kind === 'flash') {
        // stays in place, just fades
      } else if (p.kind === 'smoke') {
        p.x += p.vx; p.y += p.vy;
        p.vy -= 0.04; p.vx *= 0.98;
      } else if (p.kind === 'spark') {
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.92; p.vy *= 0.92;
      } else {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.12; p.vx *= 0.96;
      }
      p.life--;
      if (p.life <= 0) state.explosionParts.splice(i, 1);
    }
    // --- Score popups ---
    for (let i = state.popups.length - 1; i >= 0; i--) {
      const p = state.popups[i];
      p.y -= 1.2;
      p.life--;
      if (p.life <= 0) state.popups.splice(i, 1);
    }
    // --- Background snow hearts (Nozomi only) ---
    if (state.nozomi.active && Math.random() < 0.126) spawnSnowHeart();
    for (let i = state.snowHearts.length - 1; i >= 0; i--) {
      const h = state.snowHearts[i];
      h.x += h.vx; h.y += h.vy; h.rot += h.vr;
      if (h.y > H + 30) state.snowHearts.splice(i, 1);
    }

    // --- Mode lifecycle (timers) ---
    if (state.nozomi.active && state.activeTicks >= state.nozomi.endsAtTick) {
      endNozomi();
      return;
    }
    if (state.madMama.active && state.activeTicks >= state.madMama.endsAtTick) {
      endMadMama();
    }
    if (state.superKai.active && state.activeTicks >= state.superKai.endsAtTick) {
      endSuperKai();
    }
    if (state.papa.active && state.activeTicks >= state.papa.endsAtTick) {
      endPapa();
    }
    if (state.akhil.active && state.activeTicks >= state.akhil.endsAtTick) {
      endAkhil();
    }

    // --- Item spawn (only while the ball is in play and no mode is active) ---
    const canSpawn = !state.fallingItem
                  && !state.nozomi.active && !state.madMama.active && !state.superKai.active
                  && !state.papa.active && !state.akhil.active
                  && !state.ball.stuck && state.activeTicks >= state.nextSpawnTick;
    if (canSpawn) spawnFallingItem();

    // --- Falling item: sinusoidal motion + paddle catch ---
    if (state.fallingItem) {
      const it = state.fallingItem;
      it.t++;
      it.y += it.vy;
      // Smooth, predictable sine sway — constant amplitude.
      const AMP = 80;
      it.x = it.startX + Math.sin(it.t * 0.038) * AMP;
      it.x = Math.max(10, Math.min(W - 10 - it.w, it.x));
      if (it.y > H) {
        state.fallingItem = null;
        scheduleNextSpawn();
      } else if (!state.nozomi.active && !state.madMama.active && !state.superKai.active
              && !state.papa.active && !state.akhil.active) {
        const paddleY = paddleTopY();
        const overlapX = it.x < state.paddleX + paddleW() && it.x + it.w > state.paddleX;
        const overlapY = it.y + it.h >= paddleY && it.y <= (H - 30) + PADDLE_H + 6;
        if (overlapX && overlapY) {
          const caughtType = it.type;
          state.fallingItem = null;
          if (caughtType === 'heart')          startNozomi();
          else if (caughtType === 'superKai')  startSuperKai();
          else if (caughtType === 'papa')      startPapa();
          else if (caughtType === 'akhil')     startAkhil();
          else                                  startMadMama();
        }
      }
    }

    // --- Paddle motion ---
    if (state.nozomi.active) {
      state.nozomi.paddlePerim += PERIM_SPEED;
    } else {
      const kspeed = 9;
      if (state.keys.left)  state.paddleX -= kspeed;
      if (state.keys.right) state.paddleX += kspeed;
      // Touch input: slide toward the finger's target at a steady speed (no teleport)
      if (state.touchTargetX !== null) {
        const targetClamped = Math.max(0, Math.min(W - paddleW(), state.touchTargetX));
        const diff = targetClamped - state.paddleX;
        const moveSpeed = 14;
        if (Math.abs(diff) <= moveSpeed) state.paddleX = targetClamped;
        else                              state.paddleX += Math.sign(diff) * moveSpeed;
      }
      state.paddleX = Math.max(0, Math.min(W - paddleW(), state.paddleX));
      if (state.ball.stuck) state.ball.x = state.paddleX + paddleW()/2;
    }

    if (state.ball.stuck) return;

    // ---------- AKHIL homing ball: bypass normal physics ----------
    if (state.akhil.active) {
      state.akhil.rotation += 0.025; // spin (50% slower than before)
      const R = ballRadius();
      if (state.akhil.bounceTicks > 0) {
        // Brief "bounce away" after hitting a brick.
        state.ball.x += state.ball.vx;
        state.ball.y += state.ball.vy;
        state.akhil.bounceTicks--;
        if (state.akhil.bounceTicks === 0) state.akhil.target = null;
      } else {
        // Find / re-acquire nearest target (non-steel brick).
        if (!state.akhil.target || !state.akhil.target.alive || state.akhil.target.kind === 'steel') {
          let nearest = null, nearestD = Infinity;
          for (const b of state.bricks) {
            if (!b.alive || b.kind === 'steel') continue;
            const dx = (b.x + b.w/2) - state.ball.x;
            const dy = (b.y + b.h/2) - state.ball.y;
            const d = dx*dx + dy*dy;
            if (d < nearestD) { nearestD = d; nearest = b; }
          }
          state.akhil.target = nearest;
        }
        const target = state.akhil.target;
        if (target) {
          const tx = target.x + target.w/2, ty = target.y + target.h/2;
          const dx = tx - state.ball.x, dy = ty - state.ball.y;
          const d = Math.hypot(dx, dy) || 1;
          const speed = 6.5;  // homing speed
          state.ball.vx = (dx / d) * speed;
          state.ball.vy = (dy / d) * speed;
          state.ball.x += state.ball.vx;
          state.ball.y += state.ball.vy;
          // Hit?
          if (state.ball.x + R > target.x && state.ball.x - R < target.x + target.w &&
              state.ball.y + R > target.y && state.ball.y - R < target.y + target.h) {
            const destroyed = damageBrick(target);
            // Always bounce back so a tough brick (hp=2) requires two visits to break,
            // matching normal ball behaviour. Without this, the ball would overlap the
            // brick on consecutive frames and chip both HPs off in one "visit".
            state.ball.vx = -state.ball.vx;
            state.ball.vy = -state.ball.vy;
            state.akhil.bounceTicks = 28;
            playAkhilLaugh();
            if (destroyed && state.bricks.every(bb => !bb.alive || bb.kind === 'steel')) {
              triggerLevelClear();
            }
            // If the brick survived (tough w/ remaining hp), clear target so we re-acquire
            // — but the same brick is usually still nearest, so the ball will return.
            if (!destroyed) state.akhil.target = null;
          }
        } else {
          // No targets — coast in place
          state.ball.vx *= 0.95;
          state.ball.vy *= 0.95;
          state.ball.x += state.ball.vx;
          state.ball.y += state.ball.vy;
        }
      }
      // Wall clamps (AKHIL ball stays in canvas).
      if (state.ball.x - R < 0) state.ball.x = R;
      if (state.ball.x + R > W) state.ball.x = W - R;
      if (state.ball.y - R < 0) state.ball.y = R;
      if (state.ball.y + R > H - 30) state.ball.y = H - 30 - R;  // never reaches paddle
      return;  // skip the rest of normal physics
    }

    state.ball.x += state.ball.vx;
    state.ball.y += state.ball.vy;

    const R = ballRadius();

    // walls
    if (state.ball.x - R < 0) { state.ball.x = R;     state.ball.vx *= -1; }
    if (state.ball.x + R > W) { state.ball.x = W - R; state.ball.vx *= -1; }
    if (state.ball.y - R < 0) { state.ball.y = R;     state.ball.vy *= -1; }
    if (state.nozomi.active && state.ball.y + R > H) {
      state.ball.y = H - R; state.ball.vy *= -1;
    }

    // paddle — only in non-Nozomi modes (MAD MAMA / SUPERKAI / PAPA / AKHIL still use the paddle)
    if (!state.nozomi.active) {
      const py = paddleTopY();    // top of visible paddle — higher during PAPA mode
      const paddleBot = (H - 30) + PADDLE_H;
      if (state.ball.vy > 0 &&
          state.ball.y + R >= py &&
          state.ball.y - R <= paddleBot &&
          state.ball.x >= state.paddleX - R*0.4 &&
          state.ball.x <= state.paddleX + paddleW() + R*0.4) {
        state.ball.y = py - R;
        const rel = (state.ball.x - (state.paddleX + paddleW()/2)) / (paddleW()/2);
        const speed = Math.hypot(state.ball.vx, state.ball.vy);
        const angle = (-Math.PI/2) + rel * (Math.PI/3);
        state.ball.vx = Math.cos(angle) * speed;
        state.ball.vy = Math.sin(angle) * speed;
        state.ball.lastPaddleHitTick = state.activeTicks;
        state.combo = 0;
      }

      // floor — handle ball off bottom
      if (state.ball.y - R > H) {
        // During SUPERKAI, promote a surviving extra to primary if any exist.
        if (state.superKai.active) {
          const idx = state.extras.findIndex(e => !e.fading);
          if (idx >= 0) {
            const promoted = state.extras.splice(idx, 1)[0];
            state.ball.x = promoted.x; state.ball.y = promoted.y;
            state.ball.vx = promoted.vx; state.ball.vy = promoted.vy;
            state.ball.lastPaddleHitTick = promoted.lastPaddleHitTick;
            // No life lost
          } else {
            // All balls gone — end SUPERKAI and lose a life
            endSuperKai();
            loseLife();
          }
        } else {
          if (state.madMama.active) endMadMama();
          if (state.papa.active)    endPapa();
          if (state.akhil.active)   endAkhil();
          loseLife();
        }
      }
    }

    // bricks
    for (const b of state.bricks) {
      if (!b.alive) continue;
      if (state.ball.x + R > b.x &&
          state.ball.x - R < b.x + b.w &&
          state.ball.y + R > b.y &&
          state.ball.y - R < b.y + b.h) {
        // Capture pre-hit velocity for bounce direction calc (before clearing).
        const prevX = state.ball.x - state.ball.vx;
        const prevY = state.ball.y - state.ball.vy;

        if (state.nozomi.active) {
          // Pass-through: clear non-steel bricks. Steel bricks survive.
          damageBrick(b, { force: true });
        } else if (state.madMama.active) {
          // EXPLOSION destroys everything in the blast radius, INCLUDING steel.
          spawnExplosion(b);
          const neighbors = adjacentBricks(b);
          damageBrick(b, { force: true });
          for (const n of neighbors) damageBrick(n, { force: true });
          playExplosion();
          // Ball bounces off normally
          const hitFromSide = (prevX + R <= b.x) || (prevX - R >= b.x + b.w);
          const hitFromTop  = (prevY + R <= b.y) || (prevY - R >= b.y + b.h);
          if (hitFromSide) state.ball.vx *= -1;
          if (hitFromTop || !hitFromSide) state.ball.vy *= -1;
        } else {
          // Normal Kai-ball hit
          // Normal Kai-ball hit (also covers PAPA and SuperKai modes).
          const destroyed = damageBrick(b);
          if (destroyed) {
            state.funnyUntil = performance.now() + 450;
            playFunnySound();
          }
          const hitFromSide = (prevX + R <= b.x) || (prevX - R >= b.x + b.w);
          const hitFromTop  = (prevY + R <= b.y) || (prevY - R >= b.y + b.h);
          if (hitFromSide) state.ball.vx *= -1;
          if (hitFromTop || !hitFromSide) state.ball.vy *= -1;
        }

        if (state.bricks.every(b => !b.alive || b.kind === 'steel')) {
          triggerLevelClear();
        }
        if (!state.nozomi.active) break;
      }
    }

    // ---------- Extras (multi-ball during SUPERKAI + fading after) ----------
    for (let i = state.extras.length - 1; i >= 0; i--) {
      const e = state.extras[i];
      if (e.fading) {
        // Phantom drift: keep moving but no collisions, fade quickly.
        e.x += e.vx;
        e.y += e.vy;
        e.fadeAlpha -= 0.06;
        if (e.fadeAlpha <= 0) state.extras.splice(i, 1);
        continue;
      }
      // Active extra (during SUPERKAI)
      e.x += e.vx;
      e.y += e.vy;
      // Walls
      if (e.x - R < 0) { e.x = R;     e.vx *= -1; }
      if (e.x + R > W) { e.x = W - R; e.vx *= -1; }
      if (e.y - R < 0) { e.y = R;     e.vy *= -1; }
      // Paddle
      const py = paddleTopY();
      const paddleBot = (H - 30) + PADDLE_H;
      if (e.vy > 0 &&
          e.y + R >= py && e.y - R <= paddleBot &&
          e.x >= state.paddleX - R*0.4 && e.x <= state.paddleX + paddleW() + R*0.4) {
        e.y = py - R;
        const rel = (e.x - (state.paddleX + paddleW()/2)) / (paddleW()/2);
        const sp = Math.hypot(e.vx, e.vy);
        const a = (-Math.PI/2) + rel * (Math.PI/3);
        e.vx = Math.cos(a) * sp; e.vy = Math.sin(a) * sp;
        e.lastPaddleHitTick = state.activeTicks;
        state.combo = 0;
      }
      // Fell off bottom: just remove (no life lost as long as some ball still alive)
      if (e.y - R > H) {
        state.extras.splice(i, 1);
        continue;
      }
      // Bricks
      for (const b of state.bricks) {
        if (!b.alive) continue;
        if (e.x + R > b.x && e.x - R < b.x + b.w &&
            e.y + R > b.y && e.y - R < b.y + b.h) {
          const prevX = e.x - e.vx;
          const prevY = e.y - e.vy;
          damageBrick(b);
          const hitFromSide = (prevX + R <= b.x) || (prevX - R >= b.x + b.w);
          const hitFromTop  = (prevY + R <= b.y) || (prevY - R >= b.y + b.h);
          if (hitFromSide) e.vx *= -1;
          if (hitFromTop || !hitFromSide) e.vy *= -1;
          if (state.bricks.every(b => !b.alive || b.kind === 'steel')) {
            triggerLevelClear();
          }
          break;
        }
      }
    }
  }

  // ---------- Drawing ----------
  function drawBricks() {
    for (const b of state.bricks) {
      if (!b.alive) continue;
      if (b.kind === 'steel') { drawSteelBrick(b); continue; }
      if (b.kind === 'tough') { drawToughBrick(b); continue; }
      drawNormalBrick(b);
    }
  }
  function drawNormalBrick(b) {
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, b.color);
    grad.addColorStop(1, shade(b.color, -28));
    ctx.fillStyle = grad;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    ctx.fillRect(b.x, b.y, b.w, 3);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(b.x, b.y + b.h - 1, b.w, 1);
  }
  function drawToughBrick(b) {
    // Darker hue of the brick's row color — so it reads "tough" by tint alone.
    const top = shade(b.color, -35);
    const bot = shade(b.color, -65);
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, top);
    grad.addColorStop(1, bot);
    ctx.fillStyle = grad;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Carbon-fiber-style weave: alternating horizontal + vertical short bars,
    // contained strictly within the brick (no overflow off the edges).
    ctx.save();
    const cellW = 6, cellH = 4;
    for (let yy = 1; yy < b.h - 1; yy += cellH) {
      for (let xx = 1; xx < b.w - 1; xx += cellW) {
        // alternate orientation per cell to give a weave look
        const horiz = ((Math.floor(xx / cellW) + Math.floor(yy / cellH)) % 2) === 0;
        ctx.fillStyle = horiz ? 'rgba(255,255,255,0.14)' : 'rgba(0,0,0,0.20)';
        const cw = Math.min(cellW - 1, b.w - 2 - xx);
        const ch = Math.min(cellH - 1, b.h - 2 - yy);
        if (cw > 0 && ch > 0) {
          ctx.fillRect(b.x + xx, b.y + yy, cw, ch);
        }
      }
    }
    ctx.restore();
    // Heavy outer border, bevel highlight on top/left, shadow on bottom/right.
    ctx.fillStyle = 'rgba(255,255,255,0.30)';
    ctx.fillRect(b.x, b.y, b.w, 2);
    ctx.fillRect(b.x, b.y, 2, b.h);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(b.x, b.y + b.h - 2, b.w, 2);
    ctx.fillRect(b.x + b.w - 2, b.y, 2, b.h);
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
    // Bigger, more visible corner rivets — dark stud with a clear highlight.
    const rivets = [[4, 4], [b.w-4, 4], [4, b.h-4], [b.w-4, b.h-4]];
    rivets.forEach(([dx, dy]) => {
      ctx.fillStyle = '#0c0c0c';
      ctx.beginPath();
      ctx.arc(b.x + dx, b.y + dy, 2.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.beginPath();
      ctx.arc(b.x + dx - 0.9, b.y + dy - 0.9, 1.1, 0, Math.PI * 2);
      ctx.fill();
    });
    // Damaged: large jagged cracks across the brick body.
    if (b.hp < b.maxHp) {
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.9)';
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'miter';
      ctx.beginPath();
      ctx.moveTo(b.x + b.w * 0.15, b.y + 2);
      ctx.lineTo(b.x + b.w * 0.35, b.y + b.h * 0.45);
      ctx.lineTo(b.x + b.w * 0.18, b.y + b.h * 0.70);
      ctx.lineTo(b.x + b.w * 0.42, b.y + b.h - 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(b.x + b.w * 0.55, b.y + b.h * 0.20);
      ctx.lineTo(b.x + b.w * 0.72, b.y + b.h * 0.48);
      ctx.lineTo(b.x + b.w * 0.62, b.y + b.h * 0.75);
      ctx.lineTo(b.x + b.w * 0.86, b.y + b.h - 3);
      ctx.stroke();
      // Bright glint along one edge so cracks pop against dark bg.
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x + b.w * 0.15, b.y + 3);
      ctx.lineTo(b.x + b.w * 0.35, b.y + b.h * 0.45);
      ctx.stroke();
      ctx.restore();
    }
  }
  function drawSteelBrick(b) {
    // Brushed-metal gray with horizontal grain + rivets and a strong border.
    const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    g.addColorStop(0, '#dfe5ea');
    g.addColorStop(0.5, '#8a9099');
    g.addColorStop(1, '#4a5058');
    ctx.fillStyle = g;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Horizontal brushed-metal grain, contained within the brick.
    ctx.save();
    ctx.beginPath();
    ctx.rect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
    ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    for (let yy = 2; yy < b.h - 1; yy += 3) {
      ctx.beginPath();
      ctx.moveTo(b.x + 1, b.y + yy);
      ctx.lineTo(b.x + b.w - 1, b.y + yy);
      ctx.stroke();
    }
    ctx.restore();
    // Top highlight + bottom shadow for 3D feel.
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillRect(b.x, b.y, b.w, 2);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(b.x, b.y + b.h - 2, b.w, 2);
    // Heavy dark border
    ctx.strokeStyle = '#1f242a';
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
    // Bigger, more visible rivets with highlights
    const rivets = [[4, 4], [b.w-4, 4], [4, b.h-4], [b.w-4, b.h-4]];
    rivets.forEach(([dx, dy]) => {
      ctx.fillStyle = '#2a3038';
      ctx.beginPath();
      ctx.arc(b.x + dx, b.y + dy, 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(b.x + dx - 0.8, b.y + dy - 0.8, 0.9, 0, Math.PI * 2);
      ctx.fill();
    });
  }
  // helper: darken/lighten a hex color by amount (-100..100)
  function shade(hex, amt) {
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2), 16);
    const g = parseInt(c.substring(2,4), 16);
    const b = parseInt(c.substring(4,6), 16);
    const adj = v => Math.max(0, Math.min(255, v + amt));
    return 'rgb(' + adj(r) + ',' + adj(g) + ',' + adj(b) + ')';
  }
  function drawPaddle() {
    const y = H - 30;
    const px = state.paddleX;
    const w = paddleW(), h = PADDLE_H;

    // PAPA mode: papapaddle.png rendered with character bottom near canvas floor.
    // Uses shared papaPaddleLayout() so collision and visuals stay in sync.
    if (state.papa.active && photos.papaPaddle) {
      const layout = papaPaddleLayout();
      const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 180);
      // Use canvas shadowBlur (cross-browser, works on iOS Safari where
      // ctx.filter drop-shadow can be flaky) — the image has a real alpha
      // channel so the shadow traces the silhouette, not the bounding box.
      ctx.save();
      ctx.shadowColor = 'rgba(91, 210, 255, 0.95)';
      ctx.shadowBlur  = 22 + pulse * 14;
      ctx.drawImage(photos.papaPaddle, px, layout.py, layout.drawW, layout.drawH);
      // Second pass adds an extra glow halo without re-drawing visually.
      ctx.shadowBlur = 36 + pulse * 18;
      ctx.shadowColor = 'rgba(91, 210, 255, 0.55)';
      ctx.drawImage(photos.papaPaddle, px, layout.py, layout.drawW, layout.drawH);
      ctx.restore();
      return;
    }
    // Glossy light-blue paddle matching the logo art: rounded, pixel-art highlights,
    // single cyan gradient body with subtle inner shine.

    // Outer soft cyan glow (drop shadow look)
    ctx.save();
    ctx.shadowColor = 'rgba(91, 210, 255, 0.65)';
    ctx.shadowBlur = 16;
    // Body — gradient of light blues
    const body = ctx.createLinearGradient(0, y, 0, y + h);
    body.addColorStop(0,    '#cdeeff');
    body.addColorStop(0.30, '#7adcff');
    body.addColorStop(0.55, '#3eb5ff');
    body.addColorStop(1,    '#1d6cc0');
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.roundRect(px, y, w, h, 7);
    ctx.fill();
    ctx.restore();

    // Inner subtle band (slightly brighter cyan rectangle for sheen)
    const innerY = y + 2;
    const innerH = Math.max(2, Math.floor(h * 0.35));
    const sheen = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
    sheen.addColorStop(0, 'rgba(255, 255, 255, 0.55)');
    sheen.addColorStop(1, 'rgba(255, 255, 255, 0.04)');
    ctx.fillStyle = sheen;
    ctx.beginPath();
    ctx.roundRect(px + 6, innerY, w - 12, innerH, 4);
    ctx.fill();

    // Thin bright top highlight (1px line)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
    ctx.fillRect(px + 8, y + 1, w - 16, 1);

    // Dark navy bottom shadow line for depth
    ctx.fillStyle = 'rgba(15, 40, 85, 0.55)';
    ctx.fillRect(px + 6, y + h - 2, w - 12, 1);
  }
  function drawDefaultFace(x, y, r, funny) {
    // Cartoon fallback if no photo loaded
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = '#ffd9a3'; ctx.fill();
    ctx.strokeStyle = '#8a5a2a'; ctx.lineWidth = 2; ctx.stroke();
    // hair
    ctx.beginPath();
    ctx.arc(x, y - r*0.3, r*0.95, Math.PI, 0);
    ctx.fillStyle = '#2a1a0a'; ctx.fill();
    if (!funny) {
      // normal eyes
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(x - r*0.3, y - r*0.05, r*0.09, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + r*0.3, y - r*0.05, r*0.09, 0, Math.PI*2); ctx.fill();
      // smile
      ctx.strokeStyle = '#5a2a1a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y + r*0.15, r*0.35, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    }
  }
  function drawBall() {
    // Primary ball
    drawOneBall(state.ball, 1);
    // Extras (during SUPERKAI + any leftover that are fading)
    for (const e of state.extras) {
      drawOneBall(e, e.fading ? e.fadeAlpha : 1);
    }
  }
  function drawOneBall(ball, alpha) {
    const x = ball.x, y = ball.y;
    const r = ballRadius();
    const isPrimary = ball === state.ball;
    const funny = isPrimary && performance.now() < state.funnyUntil
                  && !state.nozomi.active && !state.madMama.active && !state.superKai.active
                  && !state.akhil.active;
    // PAPA mode still uses the normal Kai ball — silly face works the same.
    const scale = funny ? 1.23 : 1.0;

    ctx.save();
    if (alpha < 1) ctx.globalAlpha = alpha;

    // Glow color per active mode.
    if (state.nozomi.active || state.madMama.active || state.superKai.active || state.akhil.active) {
      const pulse = 1 + Math.sin(performance.now() / 90) * 0.08;
      const factor = state.madMama.active ? 1.45
                   : state.superKai.active ? 1.3
                   : state.akhil.active ? 1.4
                   : 1.6;
      const glowR = r * factor * pulse;
      const grad = ctx.createRadialGradient(x, y, r * 0.9, x, y, glowR);
      if (state.nozomi.active) {
        grad.addColorStop(0,   'rgba(255, 90, 180, 0.55)');
        grad.addColorStop(0.5, 'rgba(255, 90, 180, 0.25)');
        grad.addColorStop(1,   'rgba(255, 90, 180, 0)');
      } else if (state.madMama.active) {
        grad.addColorStop(0,   'rgba(255, 50, 30, 0.65)');
        grad.addColorStop(0.5, 'rgba(255, 60, 30, 0.28)');
        grad.addColorStop(1,   'rgba(255, 60, 30, 0)');
      } else if (state.akhil.active) {
        grad.addColorStop(0,   'rgba(255, 220, 60, 0.60)');
        grad.addColorStop(0.5, 'rgba(255, 220, 60, 0.25)');
        grad.addColorStop(1,   'rgba(255, 220, 60, 0)');
      } else { // superKai
        grad.addColorStop(0,   'rgba(80, 240, 100, 0.55)');
        grad.addColorStop(0.5, 'rgba(80, 240, 100, 0.22)');
        grad.addColorStop(1,   'rgba(80, 240, 100, 0)');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, glowR, 0, Math.PI*2);
      ctx.fill();
    }

    // pick which photo to show
    let photo;
    let photoRotation = 0;
    if (state.nozomi.active) {
      photo = photos.nozomi || photos.normal;
    } else if (state.madMama.active) {
      photo = photos.mama || photos.normal;
    } else if (state.akhil.active) {
      photo = photos.akhilBall || photos.normal;
      photoRotation = state.akhil.rotation;
    } else if (state.superKai.active) {
      photo = photos.silly || photos.normal;
    } else if (funny) {
      photo = photos.silly || photos.normal;
    } else {
      photo = photos.normal;
    }
    const overlayFunny = funny && !photos.silly
                       && !state.nozomi.active && !state.madMama.active
                       && !state.superKai.active && !state.akhil.active && !state.papa.active;

    ctx.translate(x, y);
    if (photoRotation) ctx.rotate(photoRotation);
    ctx.scale(scale, scale);

    if (photo) {
      // clip to circle
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI*2);
      ctx.closePath();
      ctx.clip();
      // cover-fit
      const ar = photo.width / photo.height;
      let dw, dh;
      if (ar > 1) { dh = r*2; dw = dh * ar; }
      else        { dw = r*2; dh = dw / ar; }
      ctx.drawImage(photo, -dw/2, -dh/2, dw, dh);
      ctx.restore();
      // (ring intentionally removed — just the face ball, no outline)
    } else {
      drawDefaultFace(0, 0, r, funny);
    }

    if (overlayFunny) {
      // GIANT googly eyes
      const ex = r * 0.32, ey = -r * 0.05;
      const eyeR = r * 0.32;
      for (const sign of [-1, 1]) {
        ctx.beginPath();
        ctx.arc(sign * ex, ey, eyeR, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        // pupil that wobbles
        const wob = Math.sin(performance.now() / 30) * eyeR * 0.3;
        ctx.beginPath();
        ctx.arc(sign * ex + wob, ey + Math.cos(performance.now()/35) * eyeR * 0.2, eyeR*0.45, 0, Math.PI*2);
        ctx.fillStyle = '#000';
        ctx.fill();
      }
      // TONGUE sticking out
      ctx.save();
      ctx.translate(0, r * 0.45);
      ctx.beginPath();
      ctx.moveTo(-r*0.18, 0);
      ctx.quadraticCurveTo(0, r*0.7, r*0.18, 0);
      ctx.closePath();
      ctx.fillStyle = '#ff5577';
      ctx.fill();
      ctx.strokeStyle = '#aa2244';
      ctx.lineWidth = 2;
      ctx.stroke();
      // tongue center line
      ctx.beginPath();
      ctx.moveTo(0, r*0.05);
      ctx.lineTo(0, r*0.45);
      ctx.strokeStyle = '#aa2244'; ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  // Heart path centered at (cx, cy) with given total size.
  function heartPath(cx, cy, size) {
    const halfW = size * 0.50;
    const halfH = size * 0.50;
    ctx.beginPath();
    // Start at the cleft (top middle, between the lobes)
    ctx.moveTo(cx, cy - halfH * 0.55);
    // Up-and-around the LEFT lobe
    ctx.bezierCurveTo(
      cx - halfW * 0.55, cy - halfH * 1.10,
      cx - halfW * 1.10, cy - halfH * 0.85,
      cx - halfW * 0.95, cy - halfH * 0.30
    );
    // Down the left side, curving to the bottom point
    ctx.bezierCurveTo(
      cx - halfW * 0.85, cy + halfH * 0.15,
      cx - halfW * 0.35, cy + halfH * 0.55,
      cx,                cy + halfH * 0.92
    );
    // Up the right side
    ctx.bezierCurveTo(
      cx + halfW * 0.35, cy + halfH * 0.55,
      cx + halfW * 0.85, cy + halfH * 0.15,
      cx + halfW * 0.95, cy - halfH * 0.30
    );
    // Around the RIGHT lobe and back to the cleft
    ctx.bezierCurveTo(
      cx + halfW * 1.10, cy - halfH * 0.85,
      cx + halfW * 0.55, cy - halfH * 1.10,
      cx,                cy - halfH * 0.55
    );
    ctx.closePath();
  }

  function drawFallingItem() {
    if (!state.fallingItem) return;
    const it = state.fallingItem;
    if (it.type === 'heart')         drawHeartItem(it);
    else if (it.type === 'superKai') drawSuperKaiItem(it);
    else if (it.type === 'papa')     drawPhotoItem(it, photos.papaItem, 'rgba(91, 210, 255, 0.95)');
    else if (it.type === 'akhil')    drawPhotoItem(it, photos.akhilGlasses, 'rgba(255, 220, 60, 0.95)', 1.85);
    else                              drawBombItem(it);
  }
  // Generic falling-item that uses an image + glow. `scaleMult` lets callers
  // override the default 1.25× smaller-dim scaling (useful when an image needs
  // to look bigger after artwork changes).
  function drawPhotoItem(it, image, glowColor, scaleMult) {
    const { x, y, w, h } = it;
    const cx = x + w/2, cy = y + h/2;
    const t = performance.now();
    const pulse = 0.5 + 0.5 * Math.sin(t / 240);
    ctx.save();
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 22 + pulse * 18;
    if (image) {
      const ar = image.width / image.height;
      const targetMin = w * (scaleMult || 1.25);
      let dw, dh;
      if (ar > 1) { dh = targetMin; dw = targetMin * ar; }
      else        { dw = targetMin; dh = targetMin / ar; }
      ctx.drawImage(image, cx - dw/2, cy - dh/2, dw, dh);
    } else {
      // Fallback: glowing circle in the glow color.
      ctx.fillStyle = glowColor;
      ctx.beginPath();
      ctx.arc(cx, cy, w * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  function drawSuperKaiItem(it) {
    const { x, y, w, h } = it;
    const cx = x + w/2, cy = y + h/2;
    const t = performance.now();
    const pulse = 0.5 + 0.5 * Math.sin(t / 240);
    // Green glow halo
    ctx.save();
    ctx.shadowColor = 'rgba(80, 240, 100, 0.95)';
    ctx.shadowBlur = 22 + pulse * 18;
    // Photo (cropped to circle) — if image loaded; else fallback green starburst
    if (photos.superKai) {
      const radius = w * 0.46;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI*2);
      ctx.closePath();
      ctx.save();
      ctx.clip();
      const ar = photos.superKai.width / photos.superKai.height;
      let dw, dh;
      if (ar > 1) { dh = radius*2; dw = dh * ar; }
      else        { dw = radius*2; dh = dw / ar; }
      ctx.drawImage(photos.superKai, cx - dw/2, cy - dh/2, dw, dh);
      ctx.restore();
    } else {
      // Fallback: green burst with star shape
      const radius = w * 0.45;
      const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, radius);
      grad.addColorStop(0, '#dffce5');
      grad.addColorStop(0.5, '#5DD96A');
      grad.addColorStop(1, '#1f8a36');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
    // Bright outer ring
    ctx.strokeStyle = 'rgba(180, 255, 200, 0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, w * 0.46, 0, Math.PI*2);
    ctx.stroke();
    // Sparkle stars around it (4 corners)
    const starT = t / 250;
    const starColor = `rgba(255, 255, 255, ${0.55 + 0.3 * pulse})`;
    for (let i = 0; i < 4; i++) {
      const ang = starT + i * Math.PI/2;
      const sx = cx + Math.cos(ang) * w * 0.55;
      const sy = cy + Math.sin(ang) * w * 0.55;
      drawStar(sx, sy, 3, starColor);
    }
  }
  function drawStar(cx, cy, size, color) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      const r = (i % 2 === 0) ? size : size * 0.4;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  function drawHeartItem(it) {
    const { x, y, w, h } = it;
    const cx = x + w/2, cy = y + h/2;
    const t = performance.now();
    const pulse = 0.5 + 0.5 * Math.sin(t / 280);
    ctx.save();
    ctx.shadowColor = 'rgba(255, 105, 180, 0.95)';
    ctx.shadowBlur = 22 + pulse * 18;
    const grad = ctx.createRadialGradient(cx - w*0.1, cy - h*0.2, 2, cx, cy, w*0.6);
    grad.addColorStop(0,   '#ffd3e5');
    grad.addColorStop(0.5, '#ff6fae');
    grad.addColorStop(1,   '#e64091');
    ctx.fillStyle = grad;
    heartPath(cx, cy, w * (0.96 + pulse * 0.06));
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = 'rgba(255, 220, 235, 0.85)';
    ctx.lineWidth = 1.5;
    heartPath(cx, cy, w * (0.96 + pulse * 0.06));
    ctx.stroke();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.beginPath();
    ctx.ellipse(cx - w*0.20, cy - h*0.25, w*0.10, h*0.06, -0.5, 0, Math.PI*2);
    ctx.fill();
  }
  function drawBombItem(it) {
    const { x, y, w, h } = it;
    const cx = x + w/2, cy = y + h/2;
    const t = performance.now();
    const pulse = 0.5 + 0.5 * Math.sin(t / 240);
    const radius = w * 0.42;
    // Danger red/orange glow
    ctx.save();
    ctx.shadowColor = 'rgba(255, 60, 20, 0.95)';
    ctx.shadowBlur = 22 + pulse * 16;
    // Bomb body — dark sphere with highlight
    const grad = ctx.createRadialGradient(cx - radius*0.35, cy - radius*0.35, radius*0.1, cx, cy, radius);
    grad.addColorStop(0,   '#6a6a6a');
    grad.addColorStop(0.55, '#2a2a2a');
    grad.addColorStop(1,    '#0a0a0a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Fuse stem
    ctx.fillStyle = '#5a4632';
    ctx.fillRect(cx - 3, cy - radius - 6, 6, 8);
    // Curving fuse
    ctx.strokeStyle = '#8a6a4a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy - radius - 4);
    ctx.bezierCurveTo(cx + 6, cy - radius - 12, cx + 14, cy - radius - 16, cx + 12, cy - radius - 22);
    ctx.stroke();
    // Spark at fuse tip (flickers)
    const sparkR = 4 + Math.sin(t / 55) * 2;
    ctx.save();
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#fff44a';
    ctx.beginPath();
    ctx.arc(cx + 12, cy - radius - 22, sparkR, 0, Math.PI * 2);
    ctx.fill();
    // Outer ember
    ctx.fillStyle = '#ff7733';
    ctx.beginPath();
    ctx.arc(cx + 12, cy - radius - 22, sparkR * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Bomb body highlight (specular)
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.ellipse(cx - radius*0.35, cy - radius*0.35, radius*0.22, radius*0.13, -0.6, 0, Math.PI*2);
    ctx.fill();
  }

  // Cartoon flame icon (used for falling fire background during MAD MAMA)
  function drawFlame(cx, cy, size, flicker) {
    const wob = Math.sin(flicker) * 0.15;
    ctx.beginPath();
    ctx.moveTo(cx, cy + size * 0.5);
    ctx.bezierCurveTo(
      cx - size * 0.5, cy + size * 0.15,
      cx - size * 0.5, cy - size * 0.2 + wob * size,
      cx - size * 0.15, cy - size * 0.55
    );
    ctx.bezierCurveTo(
      cx - size * 0.05, cy - size * 0.35,
      cx + size * 0.05, cy - size * 0.35,
      cx + size * 0.15, cy - size * 0.55
    );
    ctx.bezierCurveTo(
      cx + size * 0.5, cy - size * 0.2 - wob * size,
      cx + size * 0.5, cy + size * 0.15,
      cx, cy + size * 0.5
    );
    ctx.closePath();
  }

  function drawZigzagBorder() {
    if (!state.nozomi.active) return;
    const t = performance.now() / 80;
    const tooth = 16; // size of each zigzag tooth
    const inset = 3;
    ctx.save();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#ffea2a';
    ctx.shadowColor = '#ffea2a';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    // Walk perimeter with zigzag teeth
    const w = W - inset*2, h = H - inset*2;
    const phase = (t % (tooth*2));
    // top edge
    let x = inset, y = inset;
    ctx.moveTo(x, y);
    for (let px = 0; px <= w; px += tooth) {
      const sx = inset + px;
      const sy = inset + ((Math.floor((px + phase)/tooth) % 2) ? tooth*0.6 : 0);
      ctx.lineTo(sx, sy);
    }
    // right edge
    for (let py = 0; py <= h; py += tooth) {
      const sx = W - inset - ((Math.floor((py + phase)/tooth) % 2) ? tooth*0.6 : 0);
      const sy = inset + py;
      ctx.lineTo(sx, sy);
    }
    // bottom edge
    for (let px = 0; px <= w; px += tooth) {
      const sx = W - inset - px;
      const sy = H - inset - ((Math.floor((px + phase)/tooth) % 2) ? tooth*0.6 : 0);
      ctx.lineTo(sx, sy);
    }
    // left edge
    for (let py = 0; py <= h; py += tooth) {
      const sx = inset + ((Math.floor((py + phase)/tooth) % 2) ? tooth*0.6 : 0);
      const sy = H - inset - py;
      ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function drawSnakePaddle() {
    if (!state.nozomi.active) return;
    const halfL = SNAKE_LEN / 2;
    const steps = 40;
    ctx.save();
    // Sampling many points along the paddle's length lets the path bend
    // smoothly at the corners — "like a snake" turning 90°.
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const t = state.nozomi.paddlePerim - halfL + (SNAKE_LEN * i / steps);
      const p = perimToXY(t);
      if (i === 0) ctx.moveTo(p.x, p.y);
      else         ctx.lineTo(p.x, p.y);
    }
    ctx.lineWidth = SNAKE_THICKNESS;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    // Bright gradient feel
    ctx.strokeStyle = '#7ad8ff';
    ctx.shadowColor = '#7ad8ff';
    ctx.shadowBlur = 12;
    ctx.stroke();
    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.lineWidth = SNAKE_THICKNESS * 0.45;
    ctx.strokeStyle = '#e8f7ff';
    ctx.stroke();
    ctx.restore();
  }

  // Draw a mode countdown HUD with urgency in the final 3 seconds.
  function drawModeHud(label, remaining, baseColor, glowColor) {
    const urgent = remaining < 3;
    const t = performance.now();
    // Font grows from 14px up to ~26px over the last 3 seconds; pulses faster while urgent.
    const grow = urgent ? (3 - remaining) / 3 : 0;                    // 0..1
    const fontSize = Math.round(14 + grow * 14);                       // 14..28
    const pulse = urgent ? (0.75 + 0.25 * Math.sin(t / 90)) : 1;
    const glowBlur = urgent ? 26 + grow * 18 : 14;
    ctx.save();
    ctx.font = `bold ${fontSize}px "Press Start 2P", monospace`;
    ctx.textAlign = 'center';
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = glowBlur;
    ctx.fillStyle = baseColor.replace(/[\d.]+\)$/, (1 * pulse).toFixed(2) + ')');
    ctx.fillText(label + '  ' + remaining.toFixed(1) + 'S', W/2, 36 + grow * 4);
    ctx.restore();
  }
  function drawNozomiHud() {
    if (!state.nozomi.active) return;
    const remaining = Math.max(0, (state.nozomi.endsAtTick - state.activeTicks) / 60);
    drawModeHud('NOZOMI MODE', remaining, 'rgba(255, 110, 200, 1)', 'rgba(255, 90, 180, 0.95)');
  }
  function drawMadMamaHud() {
    if (!state.madMama.active) return;
    const remaining = Math.max(0, (state.madMama.endsAtTick - state.activeTicks) / 60);
    drawModeHud('MAD MAMA MODE', remaining, 'rgba(255, 70, 50, 1)', 'rgba(255, 40, 20, 0.95)');
  }
  function drawSuperKaiHud() {
    if (!state.superKai.active) return;
    const remaining = Math.max(0, (state.superKai.endsAtTick - state.activeTicks) / 60);
    drawModeHud('SUPERKAI MODE', remaining, 'rgba(110, 240, 130, 1)', 'rgba(70, 220, 100, 0.95)');
  }
  function drawPapaHud() {
    if (!state.papa.active) return;
    const remaining = Math.max(0, (state.papa.endsAtTick - state.activeTicks) / 60);
    drawModeHud('PAPA MODE', remaining, 'rgba(120, 200, 255, 1)', 'rgba(91, 210, 255, 0.95)');
  }
  function drawAkhilHud() {
    if (!state.akhil.active) return;
    const remaining = Math.max(0, (state.akhil.endsAtTick - state.activeTicks) / 60);
    drawModeHud('AKHIL MODE', remaining, 'rgba(255, 220, 60, 1)', 'rgba(255, 220, 60, 0.95)');
  }

  function drawHelp() {
    if (state.ball.stuck && !state.over && !state.won) {
      // Blinking retro arcade prompt, positioned mid-canvas (well above paddle/ball)
      const blink = 0.55 + 0.45 * Math.sin(performance.now() / 320);
      ctx.save();
      ctx.font = 'bold 18px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(91, 210, 255, 0.95)';
      ctx.shadowBlur = 14;
      ctx.fillStyle = `rgba(180, 230, 255, ${blink})`;
      ctx.fillText(IS_TOUCH ? 'TAP  TO  LAUNCH' : 'PRESS  SPACE  TO  LAUNCH', W/2, 360);
      ctx.shadowBlur = 0;
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillStyle = `rgba(140, 190, 235, ${0.55 * blink})`;
      if (!IS_TOUCH) ctx.fillText('OR CLICK TO LAUNCH', W/2, 388);
      ctx.restore();
    }
    if (state.paused) {
      // Slim, low-emphasis "PAUSED" — the pause/play button is the source of truth
      // for state; this is just a quick subtitle so the player knows nothing's frozen
      // by a bug.
      ctx.save();
      ctx.fillStyle = 'rgba(180, 230, 255, 0.78)';
      ctx.font = 'bold 20px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(91, 210, 255, 0.55)';
      ctx.shadowBlur = 10;
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of state.particles) {
      const alpha = Math.max(0, Math.min(1, p.life / 30));
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.restore();
    }
  }
  function drawScorePopups() {
    for (const p of state.popups) {
      const t = 1 - (p.life / p.maxLife);   // 0..1 over lifetime
      const alpha = Math.max(0, 1 - t);
      const scale = 1 + t * 0.4;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.scale(scale, scale);
      ctx.font = 'bold 14px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = alpha;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, 0, 0);
      // White inner highlight for legibility
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
    }
  }
  function drawSnowHearts() {
    for (const h of state.snowHearts) {
      ctx.save();
      ctx.translate(h.x, h.y);
      ctx.rotate(h.rot);
      ctx.globalAlpha = h.alpha;
      ctx.shadowColor = '#ff6fae';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ff6fae';
      heartPath(0, 0, h.size);
      ctx.fill();
      ctx.restore();
    }
  }
  function drawSnowFires() {
    for (const f of state.snowFires) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.globalAlpha = f.alpha;
      ctx.shadowColor = '#ff5522';
      ctx.shadowBlur = 12;
      // Layered flame: outer orange, inner yellow
      ctx.fillStyle = '#ff7a2a';
      drawFlame(0, 0, f.size, f.flicker);
      ctx.fill();
      ctx.fillStyle = '#ffd23d';
      drawFlame(0, f.size * 0.1, f.size * 0.6, f.flicker + 1);
      ctx.fill();
      ctx.restore();
    }
  }
  function drawExplosionParts() {
    if (state.explosionParts.length === 0) return;
    // Smoke first with normal blending (drawn behind the fire)
    for (const p of state.explosionParts) {
      if (p.kind !== 'smoke') continue;
      const t = 1 - (p.life / p.maxLife);
      const alpha = Math.max(0, 0.55 - t * 0.55);
      ctx.fillStyle = `rgba(${p.color},${p.color},${p.color},${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1 + t * 0.7), 0, Math.PI * 2);
      ctx.fill();
    }
    // Everything else with additive blending — gives a real flame glow without shadowBlur cost
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of state.explosionParts) {
      if (p.kind === 'smoke') continue;
      const t = 1 - (p.life / p.maxLife);
      if (p.kind === 'shock') {
        // expanding white ring, quickly fading
        const alpha = Math.max(0, 1 - t);
        ctx.globalAlpha = alpha * 0.8;
        ctx.strokeStyle = '#ffffcc';
        ctx.lineWidth = 4 * (1 - t);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.stroke();
      } else if (p.kind === 'flash') {
        const alpha = Math.max(0, 1 - t);
        const r = p.size * (1 + t * 1.5);
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
        grad.addColorStop(0, `rgba(255,250,200,${alpha})`);
        grad.addColorStop(0.5, `rgba(255,170,60,${alpha * 0.6})`);
        grad.addColorStop(1, 'rgba(255,80,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.kind === 'spark') {
        ctx.globalAlpha = Math.max(0, 1 - t);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (1 - t * 0.5), 0, Math.PI * 2);
        ctx.fill();
      } else {
        // fire
        ctx.globalAlpha = Math.max(0, 1 - t);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (1 - t * 0.3), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }
  function drawCanvasFlash() {
    if (canvasFlash <= 0) return;
    const a = (canvasFlash / 18);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = canvasFlashColor;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // Fixed-timestep accumulator so simulation runs at a consistent 60 ticks/sec
  // regardless of how fast the device's display refreshes. On a slow phone
  // where RAF can drop below 60 Hz, this prevents the game from running in
  // slow motion (ball moves the right amount of pixels per real second).
  const SIM_TICK_MS = 1000 / 60;
  let lastFrameTime = 0;
  let simAccumulator = 0;
  function frame(now) {
    if (!now) now = performance.now();
    try {
      // Run zero, one, or more simulation ticks to catch up to real time.
      if (lastFrameTime) {
        let delta = now - lastFrameTime;
        if (delta > 200) delta = 200;  // cap after tab-switch / pause
        simAccumulator += delta;
      }
      lastFrameTime = now;
      let ticks = 0;
      while (simAccumulator >= SIM_TICK_MS && ticks < 5) {
        update();
        simAccumulator -= SIM_TICK_MS;
        ticks++;
      }
      if (simAccumulator > SIM_TICK_MS * 3) simAccumulator = 0; // huge backlog → drop
      // Wrap the whole frame in try/catch — any unhandled error MUST NOT break
      // the RAF loop, or the game freezes with a blank canvas (was the bug).
      ctx.clearRect(0, 0, W, H);
      drawSnowHearts();
      drawZigzagBorder();
      drawBricks();
      drawExplosionParts();
      drawParticles();
      drawScorePopups();
      drawFallingItem();
      if (state.nozomi.active) drawSnakePaddle();
      else                     drawPaddle();
      drawBall();
      drawNozomiHud();
      drawMadMamaHud();
      drawSuperKaiHud();
      drawPapaHud();
      drawAkhilHud();
      drawHelp();
      drawCanvasFlash();
      drawPauseButton();
    } catch (err) {
      console.error('[Kai Breakout] frame error:', err);
    }
    requestAnimationFrame(frame);
  }

  // round-rect polyfill
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      this.beginPath();
      this.moveTo(x+r,y);
      this.arcTo(x+w,y,x+w,y+h,r);
      this.arcTo(x+w,y+h,x,y+h,r);
      this.arcTo(x,y+h,x,y,r);
      this.arcTo(x,y,x+w,y,r);
      this.closePath();
    };
  }

  startLevel(1);
  requestAnimationFrame(frame);
})();
</script>
</body>
