<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Kai Breakout</title>
  <!--
    Tiny redirect page. GitHub Pages serves this file by default when someone
    visits the repo's root URL. The actual game lives in `kai-breakout.html`,
    so we just bounce them straight there. Three layers of redundancy so
    every client (JS on, JS off, ancient browsers) ends up at the game:
      1. JavaScript replace (fastest — no history entry).
      2. <meta http-equiv="refresh"> (works without JS).
      3. Visible link (last-resort manual click).
    Maintenance note: do NOT put game logic in this file. Only edit
    `kai-breakout.html`. This file should rarely change.
  -->
  <meta http-equiv="refresh" content="0; url=./kai-breakout.html">
  <link rel="canonical" href="./kai-breakout.html">
  <link rel="apple-touch-icon-precomposed" href="webapp icon.png">
  <link rel="icon" href="webapp icon.png">
  <script>
    // Use replace() so the redirect doesn't add a history entry — pressing
    // "back" goes wherever the user came from, not back to this redirect.
    window.location.replace('./kai-breakout.html');
  </script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a1230; color: #c8e8ff;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    a { color: #5bd2ff; }
  </style>
</head>
<body>
  <p>Loading <a href="./kai-breakout.html">Kai Breakout</a>&hellip;</p>
</body>
</html>
