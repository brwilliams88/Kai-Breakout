<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kai Breakout" />
<meta name="theme-color" content="#0f1226" />
<link rel="apple-touch-icon" href="webapp%20icon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="webapp%20icon.png" />
<link rel="icon" type="image/png" href="kaiball.png" />
<title>Kai Breakout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@600;800&display=swap');

  html, body {
    margin: 0;
    height: 100%;
    background: #0f1226;
    color: #eef;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* Safe-area padding for iOS standalone (PWA) mode — keeps the canvas
     out from under the rounded corners / status bar / home indicator. */
  body {
    padding-top:    env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left:   env(safe-area-inset-left);
    padding-right:  env(safe-area-inset-right);
    box-sizing: border-box;
  }
  /* Scale-to-fit: the wrap is positioned absolutely and scaled by a CSS variable
     that JS recomputes on resize/orientation change. The natural design size
     is ~1180 × 700; we never scale up past 1× to avoid blurry pixels. */
  #wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(var(--game-scale, 1));
    transform-origin: center center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  canvas { touch-action: none; }
  /* Landscape-rotation prompt — visible only on phone-sized viewports held in portrait. */
  #orientation-overlay {
    position: fixed; inset: 0;
    background: radial-gradient(circle at center, #0a1842 0%, #050a22 70%, #02061a 100%);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10000; padding: 24px; text-align: center;
    color: #88c4ff; font-family: "Press Start 2P", monospace;
  }
  #orientation-overlay.show { display: flex; }
  .orient-brand {
    font-size: 12px; letter-spacing: 4px; color: #5bd2ff;
    text-shadow: 0 0 10px rgba(91, 210, 255, 0.65); margin-bottom: 32px;
  }
  .rotate-icon { font-size: 80px; margin-bottom: 28px; line-height: 1; }
  .rotate-icon.rotate-anim { animation: rotate-hint 1.6s ease-in-out infinite; }
  .rotate-icon.expand-anim { animation: expand-hint 1.6s ease-in-out infinite; letter-spacing: 0; }
  .rotate-text { font-size: 13px; letter-spacing: 2px; line-height: 1.9; max-width: 360px;
                 text-shadow: 0 0 12px rgba(91, 210, 255, 0.45); }
  @keyframes rotate-hint {
    0%, 100% { transform: rotate(-15deg); }
    50%      { transform: rotate(75deg); }
  }
  @keyframes expand-hint {
    0%, 100% { letter-spacing: 6px; }
    50%      { letter-spacing: 36px; }
  }
  #layout {
    display: flex;
    align-items: flex-start;
    gap: 36px;
  }
  #sidebar {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    width: 380px;
    padding-top: 0;
    height: 620px;       /* match canvas height */
    box-sizing: border-box;
  }
  #logo {
    width: 380px;
    height: auto;
    display: block;
    margin: -50px auto -28px;  /* pull top up so the logo aligns with the canvas top */
    filter: drop-shadow(0 10px 30px rgba(0, 180, 255, 0.6));
    cursor: pointer;
    transition: transform 80ms ease-out;
  }
  #logo.tap-pulse { transform: scale(1.04); filter: drop-shadow(0 0 18px rgba(91, 210, 255, 0.95)) drop-shadow(0 10px 30px rgba(0, 180, 255, 0.6)); }
  #stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    flex: 1;
  }
  .stat {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid rgba(110, 180, 255, 0.32);
    background:
      linear-gradient(180deg, rgba(28, 40, 75, 0.55), rgba(15, 22, 50, 0.55));
    box-shadow:
      0 0 14px rgba(80, 140, 255, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }
  .stat::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, rgba(110, 180, 255, 0.9), rgba(110, 180, 255, 0.35));
    box-shadow: 0 0 12px rgba(110, 180, 255, 0.7);
  }
  .stat-label {
    font-family: "Press Start 2P", monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: #88c4ff;
    text-shadow: 0 0 8px rgba(140, 200, 255, 0.55);
    white-space: nowrap;
  }
  .stat-value {
    font-family: "Orbitron", "Press Start 2P", monospace;
    font-weight: 800;
    font-size: 34px;
    color: #ffffff;
    text-shadow:
      0 0 12px rgba(150, 210, 255, 0.95),
      0 0 28px rgba(80, 140, 255, 0.5);
    line-height: 1;
    letter-spacing: 1.5px;
    min-width: 60px;
    text-align: right;
    transition: transform 0.18s ease;
  }
  .stat-value.bump { transform: scale(1.15); }
  /* Per-stat color theming */
  .stat-score { border-color: rgba(110, 180, 255, 0.45); }
  .stat-score::before { background: linear-gradient(180deg, rgba(110, 180, 255, 0.95), rgba(110, 180, 255, 0.35)); box-shadow: 0 0 14px rgba(110, 180, 255, 0.75); }
  .stat-lives { border-color: rgba(255, 130, 130, 0.42); }
  .stat-lives::before { background: linear-gradient(180deg, rgba(255, 130, 130, 0.95), rgba(255, 130, 130, 0.35)); box-shadow: 0 0 14px rgba(255, 130, 130, 0.75); }
  .stat-lives .stat-label { color: #ffa8a8; text-shadow: 0 0 8px rgba(255, 140, 140, 0.55); }
  .stat-lives .stat-value { text-shadow: 0 0 12px rgba(255, 170, 170, 0.95), 0 0 28px rgba(255, 110, 110, 0.45); }
  .stat-level { border-color: rgba(150, 240, 160, 0.42); }
  .stat-level::before { background: linear-gradient(180deg, rgba(150, 240, 160, 0.95), rgba(150, 240, 160, 0.35)); box-shadow: 0 0 14px rgba(150, 240, 160, 0.75); }
  .stat-level .stat-label { color: #a4f0b2; text-shadow: 0 0 8px rgba(160, 240, 180, 0.55); }
  .stat-level .stat-value { text-shadow: 0 0 12px rgba(180, 255, 200, 0.95), 0 0 28px rgba(110, 240, 140, 0.45); }
  canvas {
    background: linear-gradient(180deg, #1a1f3d 0%, #0f1226 100%);
    border: 2px solid #2a2f55;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    display: block;
  }
  #hint {
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    color: #6080b0;
    margin-top: 6px;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(80, 140, 200, 0.3);
  }
  #hint b { color: #88c4ff; font-weight: normal; }
  #hint .big-arrow {
    font-family: "Orbitron", sans-serif;
    font-size: 18px;
    line-height: 0;
    vertical-align: -2px;
    letter-spacing: 4px;
    font-weight: 800;
  }
  #banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(8, 12, 30, 0.86);
    padding: 26px 48px;
    border-radius: 14px;
    border: 1px solid rgba(91, 210, 255, 0.45);
    font-family: "Press Start 2P", monospace;
    font-size: 26px;
    color: #ffffff;
    display: none;
    text-align: center;
    letter-spacing: 2.5px;
    text-shadow: 0 0 14px rgba(91, 210, 255, 0.85), 0 0 28px rgba(91, 210, 255, 0.45);
    box-shadow: 0 0 30px rgba(91, 210, 255, 0.35), inset 0 0 16px rgba(91, 210, 255, 0.08);
  }
  #banner small {
    display: block;
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    color: #88c4ff;
    margin-top: 16px;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(91, 210, 255, 0.55);
  }
  #stage { position: relative; }

  /* Mini Kai head life icons */
  .lives-icons {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .life-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    filter: drop-shadow(0 0 10px rgba(255, 130, 130, 0.55));
    transition: opacity 0.25s ease, transform 0.25s ease, filter 0.25s ease;
  }
  .life-icon.lost {
    opacity: 0.18;
    filter: grayscale(1) brightness(0.55);
    transform: scale(0.82);
  }

  /* HI-SCORE card — gold theme */
  .stat-high { border-color: rgba(255, 215, 100, 0.45); }
  .stat-high::before { background: linear-gradient(180deg, rgba(255, 215, 100, 0.95), rgba(255, 215, 100, 0.35)); box-shadow: 0 0 14px rgba(255, 215, 100, 0.75); }
  .stat-high .stat-label { color: #ffd76b; text-shadow: 0 0 8px rgba(255, 200, 100, 0.55); }
  .stat-high .stat-value { text-shadow: 0 0 12px rgba(255, 220, 130, 0.95), 0 0 28px rgba(255, 180, 60, 0.45); }

  /* Game Over / You Win overlay */
  /* Fullscreen title screen */
  #title-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at center, #0a1842 0%, #050a22 70%, #02061a 100%);
    z-index: 1000;
    cursor: pointer;
    transition: opacity 0.4s ease;
    overflow: hidden;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }
  /* Subtle starfield background */
  #title-screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4) 50%, transparent 51%),
      radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,0.5) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 60% 20%, rgba(150,200,255,0.45) 50%, transparent 51%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.5) 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 35%, rgba(150,200,255,0.4) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 12% 75%, rgba(255,255,255,0.4) 50%, transparent 51%);
    background-size: 100% 100%;
    pointer-events: none;
    animation: stars-twinkle 4s ease-in-out infinite;
  }
  @keyframes stars-twinkle {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }
  .title-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 2;
    margin-top: -9vh;        /* shift everything up so footer has room */
    max-height: 90vh;
  }
  #title-logo {
    width: 540px;
    max-width: 78vw;
    max-height: 55vh;
    height: auto;
    filter: drop-shadow(0 14px 40px rgba(0, 180, 255, 0.75));
    animation: title-float 3.5s ease-in-out infinite;
    pointer-events: none;
    object-fit: contain;
  }
  @keyframes title-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .title-tagline {
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    letter-spacing: 6px;
    color: #88c4ff;
    text-shadow: 0 0 12px rgba(91, 210, 255, 0.7);
    opacity: 0.9;
    margin-top: -6px;
  }
  #title-start {
    margin-top: 14px;
    font-family: "Press Start 2P", monospace;
    font-size: 22px;
    letter-spacing: 4px;
    color: #021428;
    background: linear-gradient(180deg, #cdeeff, #5BD2FF 45%, #2A8FFF);
    border: 3px solid rgba(255, 255, 255, 0.85);
    border-radius: 14px;
    padding: 20px 44px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(91, 210, 255, 0.85), inset 0 2px 0 rgba(255,255,255,0.6);
    transition: transform 0.12s ease, box-shadow 0.2s ease;
    animation: title-pulse 1.4s ease-in-out infinite;
  }
  #title-start:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 40px rgba(91, 210, 255, 1), inset 0 2px 0 rgba(255,255,255,0.7); }
  #title-start:active { transform: translateY(0) scale(0.98); }
  @keyframes title-pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(91, 210, 255, 0.85), inset 0 2px 0 rgba(255,255,255,0.6); }
    50%      { box-shadow: 0 0 50px rgba(91, 210, 255, 1), inset 0 2px 0 rgba(255,255,255,0.7); }
  }
  /* On short viewports (phone landscape) compact the title-screen so START GAME
     button doesn't overlap the copyright footer. */
  @media (max-height: 480px) {
    #title-logo    { max-height: 44vh; max-width: 70vw; }
    .title-tagline { font-size: 10px; letter-spacing: 3px; }
    #title-start   { font-size: 14px; padding: 11px 24px; letter-spacing: 2.5px; border-width: 2px; }
    .title-content { gap: 8px; margin-top: -3vh; }
  }
  .title-footer {
    position: absolute;
    bottom: 24px;
    left: 12px;
    right: 12px;
    text-align: center;
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    letter-spacing: 2.2px;
    color: #6a85ab;
    z-index: 2;
    text-shadow: 0 0 8px rgba(91, 210, 255, 0.25);
  }

  #endgame-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(8, 12, 30, 0.92), rgba(0, 0, 0, 0.96));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    backdrop-filter: blur(4px);
    border-radius: 8px;
    transition: opacity 0.35s ease;
  }
  #endgame-overlay.hidden { display: none; opacity: 0; pointer-events: none; }
  .endgame-card {
    background: linear-gradient(180deg, rgba(28, 40, 80, 0.55), rgba(12, 18, 45, 0.55));
    border: 2px solid rgba(91, 210, 255, 0.55);
    border-radius: 18px;
    padding: 36px 56px 32px;
    text-align: center;
    box-shadow:
      0 0 40px rgba(91, 210, 255, 0.4),
      inset 0 0 24px rgba(91, 210, 255, 0.08);
    min-width: 380px;
    position: relative;
  }
  #endgame-face {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 14px;
    filter: drop-shadow(0 8px 26px rgba(91, 210, 255, 0.55));
    animation: face-bob 2.4s ease-in-out infinite;
  }
  @keyframes face-bob {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-6px) rotate(3deg); }
  }
  #endgame-title {
    font-family: "Press Start 2P", monospace;
    font-size: 32px;
    color: #fff;
    letter-spacing: 3px;
    margin: 4px 0 22px;
    text-shadow: 0 0 14px rgba(91, 210, 255, 0.95), 0 0 28px rgba(91, 210, 255, 0.5);
  }
  .endgame-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 26px;
  }
  .endgame-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 28px;
    padding: 8px 16px;
    border-radius: 8px;
    background: rgba(15, 22, 50, 0.5);
    border: 1px solid rgba(91, 210, 255, 0.2);
  }
  .endgame-label {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #88c4ff;
  }
  .endgame-num {
    font-family: "Orbitron", monospace;
    font-weight: 800;
    font-size: 26px;
    color: #fff;
    text-shadow: 0 0 10px rgba(150, 210, 255, 0.85);
    letter-spacing: 1px;
  }
  .endgame-row.new-high { border-color: rgba(255, 215, 100, 0.55); background: rgba(40, 30, 8, 0.45); }
  .endgame-row.new-high .endgame-label { color: #ffd76b; }
  .endgame-row.new-high .endgame-num { color: #ffe88a; text-shadow: 0 0 12px rgba(255, 220, 100, 0.95); }
  #endgame-button {
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    letter-spacing: 2.5px;
    color: #021428;
    background: linear-gradient(180deg, #9aebff, #5BD2FF 45%, #2A8FFF);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 10px;
    padding: 14px 32px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(91, 210, 255, 0.7), inset 0 1px 0 rgba(255,255,255,0.6);
    transition: transform 0.1s ease, box-shadow 0.2s ease;
  }
  #endgame-button:hover { transform: translateY(-2px); box-shadow: 0 4px 28px rgba(91, 210, 255, 0.9), inset 0 1px 0 rgba(255,255,255,0.6); }
  #endgame-button:active { transform: translateY(0); }

  /* Themed endgame variants */
  #endgame-overlay.lose .endgame-card { border-color: rgba(255, 70, 70, 0.6); box-shadow: 0 0 50px rgba(255, 70, 70, 0.55), inset 0 0 30px rgba(255, 70, 70, 0.1); }
  #endgame-overlay.lose #endgame-title {
    color: #ff5050;
    text-shadow: 0 0 18px rgba(255, 50, 50, 0.95), 0 0 38px rgba(255, 50, 50, 0.55);
    animation: lose-shake 0.6s ease 0s 2;
  }
  @keyframes lose-shake {
    0%, 100% { transform: translate(0, 0); }
    25%      { transform: translate(-3px, 2px); }
    75%      { transform: translate(3px, -2px); }
  }
  #endgame-overlay.win .endgame-card { border-color: rgba(91, 210, 255, 0.85); box-shadow: 0 0 60px rgba(91, 210, 255, 0.85), inset 0 0 30px rgba(91, 210, 255, 0.15); }
  #endgame-overlay.win #endgame-title {
    color: #b6efff;
    font-size: 36px;
    line-height: 1.15;
    text-shadow: 0 0 18px rgba(91, 210, 255, 1), 0 0 40px rgba(91, 210, 255, 0.7);
    animation: win-pulse 1.1s ease-in-out infinite;
  }
  @keyframes win-pulse {
    0%, 100% { transform: scale(1);    text-shadow: 0 0 18px rgba(91, 210, 255, 1), 0 0 40px rgba(91, 210, 255, 0.7); }
    50%      { transform: scale(1.06); text-shadow: 0 0 30px rgba(91, 210, 255, 1), 0 0 60px rgba(91, 210, 255, 0.95); }
  }
  /* Fireworks for win — radial starburst spokes (16 directions), translucent so
     text underneath stays legible. */
  .firework {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    background: currentColor;
  }
  @keyframes firework-burst {
    0% {
      transform: scale(0.6);
      opacity: 0;
      box-shadow:
        0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor,
        0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor,
        0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor,
        0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor, 0 0 0 currentColor;
    }
    20% { opacity: 0.65; }
    100% {
      transform: scale(1);
      opacity: 0;
      box-shadow:
        0     -70px 4px currentColor, 0     70px  4px currentColor,
        -70px   0   4px currentColor, 70px  0    4px currentColor,
        -50px -50px 4px currentColor, 50px  -50px 4px currentColor,
        -50px  50px 4px currentColor, 50px  50px  4px currentColor,
        -27px -65px 3px currentColor, 27px  -65px 3px currentColor,
        -27px  65px 3px currentColor, 27px  65px  3px currentColor,
        -65px -27px 3px currentColor, 65px  -27px 3px currentColor,
        -65px  27px 3px currentColor, 65px  27px  3px currentColor;
    }
  }
  #endgame-overlay.win .firework { animation: firework-burst 1.6s ease-out infinite; opacity: 0.65; }

  /* Level complete popup */
  #level-complete {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(8, 20, 50, 0.92), rgba(0, 4, 18, 0.97));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 22;
    backdrop-filter: blur(3px);
    border-radius: 8px;
    transition: opacity 0.3s ease;
  }
  #level-complete.hidden { display: none; opacity: 0; pointer-events: none; }
  .complete-card {
    background: linear-gradient(180deg, rgba(28, 40, 80, 0.7), rgba(12, 18, 45, 0.7));
    border: 2px solid rgba(91, 210, 255, 0.65);
    border-radius: 18px;
    padding: 30px 50px;
    text-align: center;
    box-shadow: 0 0 40px rgba(91, 210, 255, 0.5), inset 0 0 24px rgba(91, 210, 255, 0.1);
    min-width: 420px;
  }
  #complete-title {
    font-family: "Press Start 2P", monospace;
    font-size: 28px;
    color: #ffd76b;
    letter-spacing: 3px;
    margin: 0 0 22px;
    text-shadow: 0 0 16px rgba(255, 215, 100, 0.95), 0 0 32px rgba(255, 215, 100, 0.55);
    animation: complete-bounce 1.6s ease-in-out infinite;
  }
  @keyframes complete-bounce {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  .complete-rows {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .complete-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 36px;
    padding: 10px 18px;
    border-radius: 8px;
    background: rgba(15, 22, 50, 0.5);
    border: 1px solid rgba(91, 210, 255, 0.2);
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .complete-row .label { color: #88c4ff; }
  .complete-row .value {
    font-family: "Orbitron", monospace;
    font-weight: 800;
    font-size: 22px;
    color: #fff;
    text-shadow: 0 0 10px rgba(150, 210, 255, 0.85);
  }
  .complete-row.total {
    border-color: rgba(255, 215, 100, 0.6);
    background: rgba(40, 30, 8, 0.5);
    margin-top: 6px;
  }
  .complete-row.total .label { color: #ffd76b; }
  .complete-row.total .value {
    color: #ffe88a; font-size: 26px;
    text-shadow: 0 0 12px rgba(255, 220, 100, 0.95);
  }
  #complete-next {
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    letter-spacing: 2.5px;
    color: #021428;
    background: linear-gradient(180deg, #9aebff, #5BD2FF 45%, #2A8FFF);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 10px;
    padding: 14px 30px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(91, 210, 255, 0.7), inset 0 1px 0 rgba(255,255,255,0.6);
    transition: transform 0.1s ease, box-shadow 0.2s ease;
    opacity: 0;
    pointer-events: none;
  }
  #complete-next.ready { opacity: 1; pointer-events: auto; }
  #complete-next:hover { transform: translateY(-2px); box-shadow: 0 4px 28px rgba(91, 210, 255, 0.95), inset 0 1px 0 rgba(255,255,255,0.6); }
  #complete-next:active { transform: translateY(0); }
</style>
</head>
<body>
<div id="wrap">
  <div id="layout">
    <div id="sidebar">
      <img id="logo" src="KaiBreakout Logo.png" alt="Kai Breakout" />
      <div id="stats">
        <div class="stat stat-lives">
          <span class="stat-label">LIVES</span>
          <span class="lives-icons" id="lives">
            <img class="life-icon" src="kaiball.png" alt="" />
            <img class="life-icon" src="kaiball.png" alt="" />
            <img class="life-icon" src="kaiball.png" alt="" />
          </span>
        </div>
        <div class="stat stat-level"><span class="stat-label">LEVEL</span><span class="stat-value" id="level">1</span></div>
        <div class="stat stat-score"><span class="stat-label">SCORE</span><span class="stat-value" id="score">0</span></div>
        <div class="stat stat-high"><span class="stat-label">HI-SCORE</span><span class="stat-value" id="highscore">0</span></div>
      </div>
    </div>
    <div id="stage">
      <canvas id="game" width="780" height="620"></canvas>
      <div id="banner"></div>
      <div id="endgame-overlay" class="hidden">
        <div class="endgame-card">
          <img id="endgame-face" src="kaiball silly.png" alt="" />
          <h1 id="endgame-title">GAME OVER</h1>
          <div class="endgame-stats">
            <div class="endgame-row"><span class="endgame-label">YOUR SCORE</span><span id="endgame-score" class="endgame-num">0</span></div>
            <div class="endgame-row"><span class="endgame-label">HI-SCORE</span><span id="endgame-high" class="endgame-num">0</span></div>
          </div>
          <button id="endgame-button">PLAY AGAIN</button>
        </div>
      </div>
      <div id="level-complete" class="hidden">
        <div class="complete-card">
          <h1 id="complete-title">LEVEL 1 COMPLETE!</h1>
          <div class="complete-rows">
            <div class="complete-row"><span class="label">BRICKS</span><span class="value" id="complete-bricks">0</span></div>
            <div class="complete-row"><span class="label">LEVEL BONUS</span><span class="value" id="complete-bonus">0</span></div>
            <div class="complete-row"><span class="label">TIME BONUS</span><span class="value" id="complete-time">0</span></div>
            <div class="complete-row total"><span class="label">TOTAL</span><span class="value" id="complete-total">0</span></div>
          </div>
          <button id="complete-next">NEXT LEVEL</button>
        </div>
      </div>
    </div>
  </div>
  <div id="hint"></div>
</div>

<div id="orientation-overlay">
  <div class="orient-brand">KAI&nbsp;&nbsp;BREAKOUT</div>
  <div id="orientation-icon" class="rotate-icon rotate-anim">📱</div>
  <div id="orientation-msg" class="rotate-text">PLEASE ROTATE<br>YOUR DEVICE TO<br>LANDSCAPE MODE<br>TO PLAY</div>
</div>

<div id="title-screen">
  <div class="title-content">
    <img id="title-logo" src="KaiBreakout Logo.png" alt="Kai Breakout" />
    <div class="title-tagline">BRICKS &nbsp;·&nbsp; BALLS &nbsp;·&nbsp; POWERUPS</div>
    <button id="title-start" type="button">START GAME</button>
  </div>
  <div class="title-footer">© 2026 &nbsp;·&nbsp; A PAPA &amp; KAI PRODUCTION &nbsp;·&nbsp; ALL RIGHTS RESERVED</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // ---------- Device detection ----------
  const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const IS_STANDALONE =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.matchMedia('(display-mode: fullscreen)').matches ||
    window.navigator.standalone === true;
  // Populate the bottom hint text based on input device.
  const hintEl = document.getElementById('hint');
  if (hintEl) {
    hintEl.innerHTML = IS_TOUCH
      ? '<b>DRAG</b> PADDLE &nbsp;·&nbsp; <b>TAP</b> LAUNCH'
      : '<b>MOUSE</b> OR <b class="big-arrow">← →</b> PADDLE &nbsp;·&nbsp; <b>SPACE</b> LAUNCH';
  }

  // ---------- Responsive: scale-to-fit + orientation/expand prompt ----------
  // Slightly oversized natural-design dims so every screen gets a small safety
  // margin (fixes iPad mini standalone cutoff on the sides).
  const NATURAL_W = 1240;
  const NATURAL_H = 740;
  function updateGameScale() {
    // In standalone (PWA) mode the body has safe-area padding that shrinks the
    // viewable area; account for it via clientWidth/Height instead of innerWidth.
    const w = document.documentElement.clientWidth  || window.innerWidth;
    const h = document.documentElement.clientHeight || window.innerHeight;
    const sx = w / NATURAL_W;
    const sy = h / NATURAL_H;
    const s = Math.min(sx, sy, 1);
    document.documentElement.style.setProperty('--game-scale', s.toFixed(4));
  }
  const orientationEl   = document.getElementById('orientation-overlay');
  const orientationMsg  = document.getElementById('orientation-msg');
  const orientationIcon = document.getElementById('orientation-icon');
  function checkOrientation() {
    // Skip everything until the player has dismissed the title screen — the
    // title page should display fine in both portrait and landscape.
    let started = false;
    try { started = gameStarted; } catch (_) {}
    if (!started) { orientationEl.classList.remove('show'); return; }
    const w = window.innerWidth, h = window.innerHeight;
    const portrait = h > w;
    const tooNarrow = w < 760;
    const tooShort  = h < 520;
    let bad = false;
    let mode = 'rotate';
    if (IS_TOUCH && portrait)                    { bad = true; mode = 'rotate'; }
    else if (!IS_TOUCH && (tooNarrow || tooShort)) { bad = true; mode = 'expand'; }
    orientationEl.classList.toggle('show', bad);
    if (bad && orientationMsg && orientationIcon) {
      if (mode === 'rotate') {
        orientationIcon.textContent = '📱';
        orientationIcon.className = 'rotate-icon rotate-anim';
        orientationMsg.innerHTML = 'PLEASE ROTATE<br>YOUR DEVICE TO<br>LANDSCAPE MODE<br>TO PLAY';
      } else {
        // Expand-browser icon — two arrows that pulse outward via letter-spacing
        orientationIcon.textContent = '← →';
        orientationIcon.className = 'rotate-icon expand-anim';
        orientationMsg.innerHTML = 'PLEASE WIDEN<br>YOUR BROWSER<br>WINDOW<br>TO PLAY';
      }
    }
    // Auto-pause mid-game when viewport goes bad.
    if (bad) {
      try {
        if (gameStarted && !state.over && !state.won && !state.levelTransitioning && !state.paused) {
          setPaused(true);
        }
      } catch (_) {}
    }
  }
  // Recompute on resize / orientation / when returning from the iOS bar collapse.
  window.addEventListener('resize',           () => { updateGameScale(); checkOrientation(); });
  window.addEventListener('orientationchange',() => { updateGameScale(); checkOrientation(); });
  window.visualViewport && window.visualViewport.addEventListener('resize',
                                                () => { updateGameScale(); checkOrientation(); });
  updateGameScale();
  checkOrientation();

  // Auto-pause the game when the tab/window goes inactive (and stop music timers
  // through the existing pause path — they all silently no-op while paused).
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) return;
    try {
      if (gameStarted && !state.over && !state.won && !state.levelTransitioning && !state.paused) {
        setPaused(true);
      }
    } catch (_) {}
  });

  const titleScreen = document.getElementById('title-screen');
  const titleStartBtn = document.getElementById('title-start');
  // Started flag lives outside `state` so it works before state is fully initialized.
  let gameStarted = false;
  function dismissTitle() {
    if (gameStarted) return;
    gameStarted = true;
    titleScreen.classList.add('hidden');
    setTimeout(() => { titleScreen.style.display = 'none'; }, 500);
    // Now that we're in gameplay, re-check orientation (could already be bad).
    checkOrientation();
  }
  // Multiple reliable dismiss paths: button, overlay click, space key, any key.
  titleStartBtn.addEventListener('click', e => { e.stopPropagation(); dismissTitle(); });
  titleScreen.addEventListener('click', () => dismissTitle());
  window.addEventListener('keydown', e => {
    if (!gameStarted && (e.key === ' ' || e.key === 'Enter')) {
      e.preventDefault();
      dismissTitle();
    }
  });
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');  // container of life icons
  const levelEl = document.getElementById('level');
  const highEl  = document.getElementById('highscore');
  const banner  = document.getElementById('banner');
  const lifeIconEls = document.querySelectorAll('.life-icon');

  // High score — persisted across sessions
  let highScore = 0;
  try { highScore = parseInt(localStorage.getItem('kaiHighScore') || '0', 10) || 0; } catch (_) {}
  highEl.textContent = highScore;

  function setLives(n) {
    lifeIconEls.forEach((el, i) => {
      if (i < n) el.classList.remove('lost');
      else       el.classList.add('lost');
    });
  }
  let scoreBumpTimer = 0;
  function setScore(s) {
    scoreEl.textContent = s;
    // Pop animation when score changes
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth;   // restart CSS transition
    scoreEl.classList.add('bump');
    clearTimeout(scoreBumpTimer);
    scoreBumpTimer = setTimeout(() => scoreEl.classList.remove('bump'), 180);
    if (s > highScore) {
      highScore = s;
      highEl.textContent = highScore;
      try { localStorage.setItem('kaiHighScore', String(highScore)); } catch (_) {}
    }
  }

  // ---------- Sound (procedural, no external files) ----------
  let audioCtx = null;
  let muted = false;
  try { muted = localStorage.getItem('kaiMuted') === '1'; } catch (_) {}
  function ensureAudio() {
    if (muted) return null;
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (_) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playFunnySound() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const now = ctx.currentTime;

    // Cartoon "boing" — triangle wave with rapid pitch sweep
    const base = 280 + Math.random() * 90;       // varies a bit each hit
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(base, now);
    osc.frequency.exponentialRampToValueAtTime(base * 2.6, now + 0.08);
    osc.frequency.exponentialRampToValueAtTime(base * 1.3, now + 0.22);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.22, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.32);

    // Layered "blip" for whimsy
    const blip = ctx.createOscillator();
    const blipGain = ctx.createGain();
    blip.type = 'sine';
    blip.frequency.setValueAtTime(820 + Math.random() * 220, now);
    blip.frequency.exponentialRampToValueAtTime(1500, now + 0.05);
    blipGain.gain.setValueAtTime(0.12, now);
    blipGain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
    blip.connect(blipGain).connect(ctx.destination);
    blip.start(now);
    blip.stop(now + 0.11);
  }

  function playPowerSound() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    // Ascending power-up whoosh
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(1400, now + 0.5);
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    osc.connect(g).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.65);
    // Sparkle
    [880, 1320, 1760].forEach((f, i) => {
      const s = ctx.createOscillator();
      const sg = ctx.createGain();
      s.type = 'sine';
      s.frequency.value = f;
      sg.gain.setValueAtTime(0, now + i*0.08);
      sg.gain.linearRampToValueAtTime(0.12, now + i*0.08 + 0.01);
      sg.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.18);
      s.connect(sg).connect(ctx.destination);
      s.start(now + i*0.08); s.stop(now + i*0.08 + 0.2);
    });
  }

  // Pump-up music for Nozomi mode — 4-on-the-floor kick + arpeggio + offbeat lead
  let musicTimer = null;
  function startNozomiMusic() {
    stopNozomiMusic();
    const ctx = ensureAudio();
    if (!ctx) return;
    const tempo = 360; // ms per beat (~167 BPM, exciting)
    const arp = [392.00, 523.25, 659.25, 783.99, 659.25, 523.25]; // G B D G D B (Gmaj arpeggio)
    let beat = 0;
    function pulse() {
      if (!state.nozomi.active || muted || state.paused || state.over || state.won) return;
      const now = ctx.currentTime;
      // Kick drum
      const kick = ctx.createOscillator();
      const kg = ctx.createGain();
      kick.type = 'sine';
      kick.frequency.setValueAtTime(180, now);
      kick.frequency.exponentialRampToValueAtTime(45, now + 0.1);
      kg.gain.setValueAtTime(0.32, now);
      kg.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      kick.connect(kg).connect(ctx.destination);
      kick.start(now); kick.stop(now + 0.2);
      // Bass note (every 2nd beat)
      if (beat % 2 === 0) {
        const bass = ctx.createOscillator();
        const bg = ctx.createGain();
        bass.type = 'sawtooth';
        bass.frequency.value = 98; // G2
        bg.gain.setValueAtTime(0.08, now);
        bg.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        bass.connect(bg).connect(ctx.destination);
        bass.start(now); bass.stop(now + 0.28);
      }
      // Arpeggio lead
      const lead = ctx.createOscillator();
      const lg = ctx.createGain();
      lead.type = 'square';
      lead.frequency.value = arp[beat % arp.length];
      lg.gain.setValueAtTime(0, now);
      lg.gain.linearRampToValueAtTime(0.08, now + 0.005);
      lg.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      lead.connect(lg).connect(ctx.destination);
      lead.start(now); lead.stop(now + 0.16);
      // Offbeat blip (halfway between beats)
      setTimeout(() => {
        if (!state.nozomi.active || muted) return;
        const n2 = ctx.currentTime;
        const o = ctx.createOscillator();
        const og = ctx.createGain();
        o.type = 'triangle';
        o.frequency.value = arp[(beat + 3) % arp.length] * 2;
        og.gain.setValueAtTime(0.05, n2);
        og.gain.exponentialRampToValueAtTime(0.001, n2 + 0.1);
        o.connect(og).connect(ctx.destination);
        o.start(n2); o.stop(n2 + 0.12);
      }, tempo / 2);
      beat++;
    }
    pulse();
    musicTimer = setInterval(pulse, tempo);
  }
  function stopNozomiMusic() {
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
  }

  // Intense, menacing MAD MAMA music — A-minor, distorted bass + lead, harder kick
  let madMusicTimer = null;
  function startMadMamaMusic() {
    stopMadMamaMusic();
    const ctx = ensureAudio();
    if (!ctx) return;
    const tempo = 360; // ms per beat
    // A-minor pentatonic riff
    const riff = [220.00, 261.63, 220.00, 329.63, 246.94, 261.63, 220.00, 174.61];
    let beat = 0;
    function pulse() {
      if (!state.madMama.active || muted || state.paused || state.over || state.won) return;
      const now = ctx.currentTime;
      // (Music dialed back ~30% so explosions cut through clearly.)
      // Heavy kick
      const k = ctx.createOscillator();
      const kg = ctx.createGain();
      k.type = 'sine';
      k.frequency.setValueAtTime(160, now);
      k.frequency.exponentialRampToValueAtTime(38, now + 0.13);
      kg.gain.setValueAtTime(0.28, now);
      kg.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      k.connect(kg).connect(ctx.destination);
      k.start(now); k.stop(now + 0.25);
      // Detuned saw bass
      const bass = ctx.createOscillator();
      const bg = ctx.createGain();
      bass.type = 'sawtooth';
      bass.detune.value = -8;
      bass.frequency.value = 55; // A1
      bg.gain.setValueAtTime(0.075, now);
      bg.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      bass.connect(bg).connect(ctx.destination);
      bass.start(now); bass.stop(now + 0.32);
      // Saw lead riff
      const lead = ctx.createOscillator();
      const lg = ctx.createGain();
      lead.type = 'sawtooth';
      lead.frequency.value = riff[beat % riff.length];
      lg.gain.setValueAtTime(0, now);
      lg.gain.linearRampToValueAtTime(0.05, now + 0.008);
      lg.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      lead.connect(lg).connect(ctx.destination);
      lead.start(now); lead.stop(now + 0.2);
      // Snare on backbeats (2 & 4)
      if (beat % 2 === 1) {
        const bs = Math.floor(ctx.sampleRate * 0.1);
        const buf = ctx.createBuffer(1, bs, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * (1 - i/bs);
        const n = ctx.createBufferSource();
        n.buffer = buf;
        const ng = ctx.createGain();
        const nf = ctx.createBiquadFilter();
        nf.type = 'highpass';
        nf.frequency.value = 900;
        ng.gain.setValueAtTime(0.13, now);
        ng.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        n.connect(nf).connect(ng).connect(ctx.destination);
        n.start(now);
      }
      beat++;
    }
    pulse();
    madMusicTimer = setInterval(pulse, tempo);
  }
  function stopMadMamaMusic() {
    if (madMusicTimer) { clearInterval(madMusicTimer); madMusicTimer = null; }
  }

  // AKHIL "haha" laugh sound — quick chain of vowel-like blips at descending pitches
  function playAkhilLaugh() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    // 3-4 "ha" syllables — bandpass-filtered noise bursts at vowel formants
    const haCount = 3 + Math.floor(Math.random() * 2);
    for (let i = 0; i < haCount; i++) {
      const t0 = now + i * 0.085;
      // Vowel-like tone burst (triangle + filtered noise)
      const tone = ctx.createOscillator();
      const tg = ctx.createGain();
      tone.type = 'triangle';
      const pitches = [380, 340, 300, 280];
      tone.frequency.setValueAtTime(pitches[i % pitches.length], t0);
      tone.frequency.exponentialRampToValueAtTime(pitches[i % pitches.length] * 0.75, t0 + 0.08);
      tg.gain.setValueAtTime(0, t0);
      tg.gain.linearRampToValueAtTime(0.18, t0 + 0.01);
      tg.gain.exponentialRampToValueAtTime(0.001, t0 + 0.08);
      tone.connect(tg).connect(ctx.destination);
      tone.start(t0); tone.stop(t0 + 0.1);
    }
  }
  // Tough brick "crack" sound — short, sharp, high-frequency
  function playToughCrack() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    const bs = Math.floor(ctx.sampleRate * 0.12);
    const buf = ctx.createBuffer(1, bs, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bs, 2);
    const n = ctx.createBufferSource();
    n.buffer = buf;
    const nf = ctx.createBiquadFilter();
    nf.type = 'bandpass';
    nf.frequency.value = 3200;
    nf.Q.value = 1.2;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.35, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    n.connect(nf).connect(ng).connect(ctx.destination);
    n.start(now);
  }
  // Steel brick "clang" — metallic ring
  function playSteelClang() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    // High-pitched bell tone for the clang
    const freqs = [880, 1320, 1760];
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, now);
      g.gain.setValueAtTime(0.25 / (i + 1), now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o.connect(g).connect(ctx.destination);
      o.start(now); o.stop(now + 0.25);
    });
  }

  // Explosion: punchy sub-boom + mid-thump + bright crackle. Louder than before.
  function playExplosion() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    // Deep sub boom
    const boom = ctx.createOscillator();
    const bg = ctx.createGain();
    boom.type = 'sine';
    boom.frequency.setValueAtTime(170, now);
    boom.frequency.exponentialRampToValueAtTime(34, now + 0.30);
    bg.gain.setValueAtTime(0.95, now);
    bg.gain.exponentialRampToValueAtTime(0.001, now + 0.50);
    boom.connect(bg).connect(ctx.destination);
    boom.start(now); boom.stop(now + 0.55);
    // Mid-range thump for body
    const thump = ctx.createOscillator();
    const tg = ctx.createGain();
    thump.type = 'square';
    thump.frequency.setValueAtTime(320, now);
    thump.frequency.exponentialRampToValueAtTime(80, now + 0.15);
    tg.gain.setValueAtTime(0.4, now);
    tg.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    thump.connect(tg).connect(ctx.destination);
    thump.start(now); thump.stop(now + 0.2);
    // Bright crackle (white noise burst, bandpass filtered, peaks higher)
    const bs = Math.floor(ctx.sampleRate * 0.35);
    const buf = ctx.createBuffer(1, bs, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bs, 1.5);
    const n = ctx.createBufferSource();
    n.buffer = buf;
    const nf = ctx.createBiquadFilter();
    nf.type = 'bandpass';
    nf.frequency.value = 1800;
    nf.Q.value = 0.5;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.65, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    n.connect(nf).connect(ng).connect(ctx.destination);
    n.start(now);
  }

  // ---------- Polish sounds: level/win jingles + score tick ----------
  // Soft, short, retro-arcade flavored cues. Volumes deliberately kept well
  // below SFX peaks so they feel like sparkle, not interruption.
  function playLevelJingle() {
    const ctx = ensureAudio();
    if (!ctx || muted) return;
    const now = ctx.currentTime;
    // Bright ascending arpeggio: C5 → E5 → G5 → C6 (major)
    const notes = [523.25, 659.25, 783.99, 1046.50];
    const stepMs = 0.085;
    notes.forEach((freq, i) => {
      const t0 = now + i * stepMs;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.18, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.22);
      osc.connect(g).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.26);
    });
    // Final sparkle: high sine on top of the last note
    const sparkleT = now + notes.length * stepMs;
    const s = ctx.createOscillator();
    const sg = ctx.createGain();
    s.type = 'sine';
    s.frequency.setValueAtTime(1568, sparkleT); // G6
    sg.gain.setValueAtTime(0, sparkleT);
    sg.gain.linearRampToValueAtTime(0.10, sparkleT + 0.02);
    sg.gain.exponentialRampToValueAtTime(0.001, sparkleT + 0.45);
    s.connect(sg).connect(ctx.destination);
    s.start(sparkleT); s.stop(sparkleT + 0.5);
  }
  function playWinJingle() {
    const ctx = ensureAudio();
    if (!ctx || muted) return;
    const now = ctx.currentTime;
    // Longer fanfare: C5–E5–G5–C6 (fast) then hold on C6 with E6/G6 sparkle.
    const fanfare = [523.25, 659.25, 783.99, 1046.50];
    fanfare.forEach((freq, i) => {
      const t0 = now + i * 0.10;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.14, t0 + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.20);
      osc.connect(g).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.22);
    });
    // Held triad: C6, E6, G6 ringing out together
    const holdT = now + 0.42;
    const triad = [1046.50, 1318.51, 1567.98];
    triad.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, holdT);
      g.gain.setValueAtTime(0, holdT);
      g.gain.linearRampToValueAtTime(0.10 - i * 0.015, holdT + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, holdT + 0.9);
      osc.connect(g).connect(ctx.destination);
      osc.start(holdT); osc.stop(holdT + 0.95);
    });
    // Sub thump for body
    const sub = ctx.createOscillator();
    const sg = ctx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(130.81, now);
    sub.frequency.exponentialRampToValueAtTime(65, now + 0.4);
    sg.gain.setValueAtTime(0.18, now);
    sg.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    sub.connect(sg).connect(ctx.destination);
    sub.start(now); sub.stop(now + 0.55);
  }
  // Tiny, short blip used to "tick" alongside score-counter animation.
  // Frequency rises subtly with progress so a rapid counter feels like a slot
  // machine rolling up.
  function playScoreTick(progress) {
    const ctx = ensureAudio();
    if (!ctx || muted) return;
    const now = ctx.currentTime;
    const base = 520; // C5-ish
    const freq = base + (progress || 0) * 380; // climbs as score reaches target
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.045, now + 0.004);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.055);
    osc.connect(g).connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.06);
  }

  // Chill background music for normal play — pentatonic, soft sines.
  // Target: ~70% perceived loudness vs Nozomi. Nozomi peak gain ≈ 0.32; chill peaks ≈ 0.045.
  let chillTimer = null;
  function startChillMusic() {
    stopChillMusic();
    const ctx = ensureAudio();
    if (!ctx) return;
    const tempo = 700; // ms per beat (~86 BPM, relaxed)
    // C major pentatonic, gentle wandering arpeggio (8 beats per loop)
    const notes  = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 392.00, 261.63];
    const padFreq = 130.81; // C3 sub-pad
    let beat = 0;
    function pulse() {
      if (state.nozomi.active || state.madMama.active || state.superKai.active ||
          state.papa.active || state.akhil.active ||
          muted || state.paused || state.over || state.won) {
        return; // silently skip — bonus mode music or system music takes over
      }
      const now = ctx.currentTime;
      // Gentle bell-like note (sine, slow attack and release)
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = notes[beat % notes.length];
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.045, now + 0.18);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.85);
      osc.connect(g).connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.9);
      // Soft low pad every 4 beats — gives a warm wash
      if (beat % 4 === 0) {
        const pad = ctx.createOscillator();
        const pg = ctx.createGain();
        pad.type = 'sine';
        pad.frequency.value = padFreq;
        pg.gain.setValueAtTime(0, now);
        pg.gain.linearRampToValueAtTime(0.035, now + 0.5);
        pg.gain.exponentialRampToValueAtTime(0.001, now + 2.6);
        pad.connect(pg).connect(ctx.destination);
        pad.start(now); pad.stop(now + 2.7);
      }
      beat++;
    }
    pulse();
    chillTimer = setInterval(pulse, tempo);
  }
  function stopChillMusic() {
    if (chillTimer) { clearInterval(chillTimer); chillTimer = null; }
  }

  function toggleMute() {
    muted = !muted;
    try { localStorage.setItem('kaiMuted', muted ? '1' : '0'); } catch (_) {}
  }

  // ---------- Photo handling: hard-coded files alongside this HTML ----------
  // Drop kaiball.png, "kaiball silly.png", and nozomiball.png into the same folder.
  const photos = {
    normal: null, silly: null, nozomi: null, mama: null, superKai: null,
    papaItem: null, papaPaddle: null, akhilGlasses: null, akhilBall: null
  };
  const PHOTO_FILES = {
    normal:       'kaiball.png',
    silly:        'kaiball silly.png',
    nozomi:       'nozomiball.png',
    mama:         'ayaball.png',
    superKai:     'superkai.png',
    papaItem:     'papaitem.png',
    papaPaddle:   'papapaddle.png',
    akhilGlasses: 'akhilglasses.png',
    akhilBall:    'akhilball.png'
  };
  // Process an image to make near-white pixels transparent. Some of the source
  // PNGs (especially papapaddle.png) ship with a white background instead of
  // true alpha, so we color-key the white out at load time. Result is a
  // canvas element — still valid as a drawImage source.
  function keyOutWhite(img) {
    try {
      const cvs = document.createElement('canvas');
      cvs.width  = img.naturalWidth  || img.width;
      cvs.height = img.naturalHeight || img.height;
      const c = cvs.getContext('2d');
      c.drawImage(img, 0, 0);
      const data = c.getImageData(0, 0, cvs.width, cvs.height);
      const px = data.data;
      let topY = cvs.height, botY = -1;
      for (let i = 0; i < px.length; i += 4) {
        const r = px[i], g = px[i+1], b = px[i+2];
        if (r > 240 && g > 240 && b > 240) {
          px[i+3] = 0;
        } else if (r > 215 && g > 215 && b > 215 && Math.abs(r - g) < 16 && Math.abs(g - b) < 16) {
          const m = Math.min(r, g, b);
          const t = (m - 215) / 25;
          px[i+3] = Math.round(px[i+3] * (1 - t));
        }
        // Only count STRONGLY visible pixels (alpha > 150) — skips faint AA edges that
        // would extend the measured content bounds beyond what's actually visible.
        if (px[i+3] > 150) {
          const y = Math.floor((i / 4) / cvs.width);
          if (y < topY) topY = y;
          if (y > botY) botY = y;
        }
      }
      c.putImageData(data, 0, 0);
      cvs.contentTopY = topY < cvs.height ? topY : 0;
      cvs.contentBotY = botY >= 0 ? botY : cvs.height - 1;
      return cvs;
    } catch (e) {
      console.warn('Could not key out white from image — using original.', e);
      return img;
    }
  }
  // Photos whose source PNGs may have a white background we need to remove.
  const WHITE_KEY_SLOTS = new Set(['papaPaddle', 'papaItem', 'akhilGlasses']);
  for (const slot of Object.keys(PHOTO_FILES)) {
    const img = new Image();
    img.onload  = () => {
      photos[slot] = WHITE_KEY_SLOTS.has(slot) ? keyOutWhite(img) : img;
    };
    img.onerror = () => { console.warn('Missing image:', PHOTO_FILES[slot]); };
    img.src = encodeURI(PHOTO_FILES[slot]);
  }

  // ---------- Game state ----------
  const PADDLE_W_BASE = 130, PADDLE_H = 14, BALL_R = 42;
  // PADDLE_W is a function so it widens automatically during PAPA mode (3x length).
  function paddleW() { return state.papa.active ? Math.round(PADDLE_W_BASE * PAPA_PADDLE_MULT) : PADDLE_W_BASE; }
  // PAPA paddle layout — uses measured content bounds from keyOutWhite so the
  // character's back sits flush with the canvas floor and the ball bounces
  // exactly off the character's visible top edge (no air gap, no overhang).
  // Once the papa image is loaded + measured, position by pixel coords directly:
  //   • image is scaled to drawH and rendered with py such that the character's
  //     measured bottom sits exactly on the canvas floor;
  //   • collision sits exactly on the character's measured visible top.
  // If pixel access was blocked (CORS on file://), we fall back to aggressive
  // estimates that push the image very low and the collision close to it.
  let papaLayoutLogged = false;
  function papaPaddleLayout() {
    if (!photos.papaPaddle) return null;
    const img = photos.papaPaddle;
    const iw = img.naturalWidth  || img.width;
    const ih = img.naturalHeight || img.height;
    const drawW = paddleW();
    const drawH = Math.min(drawW * (ih / iw), 220);
    const scale = drawH / ih;
    // Always use the same fixed fractions whether running locally or hosted,
    // so the look is identical in both. (Pixel measurement intentionally skipped here.)
    const charTopInImg = ih * 0.42;
    const charBotInImg = ih * 0.72;
    const charTopInDraw = charTopInImg * scale;
    const charBotInDraw = charBotInImg * scale;
    // Position image so character's visible BOTTOM lands exactly at the canvas floor.
    const py = H - charBotInDraw;
    // Bounce line — character's visible top.
    const charTopY = py + charTopInDraw;
    if (!papaLayoutLogged) {
      papaLayoutLogged = true;
      console.log('[Kai Breakout] PAPA paddle layout:',
        { iw, ih, drawW, drawH,
          contentTopY: img.contentTopY, contentBotY: img.contentBotY,
          charTopInImg, charBotInImg,
          charTopInImgPct: (charTopInImg / ih * 100).toFixed(1) + '%',
          charBotInImgPct: (charBotInImg / ih * 100).toFixed(1) + '%',
          py, charTopY });
    }
    return { drawW, drawH, py, charTopY };
  }
  function paddleTopY() {
    if (state.papa.active) {
      const layout = papaPaddleLayout();
      if (layout) return layout.charTopY;
    }
    return H - 30;
  }
  const state = {
    paddleX: W/2 - PADDLE_W_BASE/2,    // can't call paddleW() here — state isn't declared yet
    ball: { x: W/2, y: H - 30 - 42 - 1, vx: 0, vy: 0, stuck: true, lastPaddleHitTick: 0 },
    extras: [],           // additional balls during SUPERKAI mode
    bricks: [],
    score: 0,
    lives: 3,
    level: 1,
    funnyUntil: 0,
    paused: false,
    over: false,
    won: false,
    keys: { left: false, right: false },
    activeTicks: 0,
    fallingItem: null,
    nextSpawnTick: 60 * 60,        // first spawn ~1 minute in
    // Bonus mode flags
    nozomi:   { active: false, endsAtTick: 0, paddlePerim: 0 },
    madMama:  { active: false, endsAtTick: 0 },
    superKai: { active: false, endsAtTick: 0 },
    papa:     { active: false, endsAtTick: 0 },
    akhil:    { active: false, endsAtTick: 0, rotation: 0, target: null, bounceTicks: 0 },
    // Combo streak (bricks cleared since last paddle hit)
    combo: 0,
    // Tick at which current level started (for time bonus)
    levelStartTick: 0,
    // Sum of brick points earned during current level (used for level-complete popup)
    levelBrickPoints: 0,
    // True while the level-complete popup is up — pauses physics.
    levelTransitioning: false,
    // Title screen state
    started: false,
    // Visual effects
    particles: [],
    explosionParts: [],
    popups: [],
    snowHearts: [],
    snowFires: []  // (unused after fire-snow removal; kept to avoid accidental refs)
  };
  const PERIM_INSET = 8;            // distance from canvas edge for snake paddle path
  const PERIM_SPEED = 7;            // px per frame the snake paddle travels
  const SNAKE_LEN = 130;            // length of the snake paddle
  const SNAKE_THICKNESS = 16;
  const NOZOMI_DURATION_TICKS   = 60 * 15;  // 15s
  const MADMAMA_DURATION_TICKS  = 60 * 15;  // 15s
  const SUPERKAI_DURATION_TICKS = 60 * 15;  // 15s
  const PAPA_DURATION_TICKS     = 60 * 30;  // 30s
  const AKHIL_DURATION_TICKS    = 60 * 15;  // 15s
  const PAPA_PADDLE_MULT = 3.0;             // PAPA paddle length multiplier
  const MAX_LEVEL = 7;
  const ITEM_W = 60, ITEM_H = 60, ITEM_FALL_SPEED = 1.06;  // 15% slower than 1.25
  const SPAWN_INTERVAL_TICKS = 60 * 60;     // 1 minute between spawns

  // Weighted random pick. Common: superkai + papa. Uncommon: akhil + mama. Rare: nozomi.
  const ITEM_WEIGHTS = [
    { type: 'superKai', w: 0.30 },
    { type: 'papa',     w: 0.30 },
    { type: 'akhil',    w: 0.15 },
    { type: 'bomb',     w: 0.15 },  // MAD MAMA
    { type: 'heart',    w: 0.10 }   // NOZOMI
  ];
  function pickItemType() {
    const total = ITEM_WEIGHTS.reduce((s, e) => s + e.w, 0);
    let r = Math.random() * total;
    for (const e of ITEM_WEIGHTS) {
      if (r < e.w) return e.type;
      r -= e.w;
    }
    return ITEM_WEIGHTS[0].type;
  }

  function buildBricks(level) {
    // 7 levels. Rows scale up to 9 at level 7. Levels 3+ introduce tough bricks
    // in CLUSTERS (organic blobs), 5+ introduce steel bricks in LINE patterns.
    const rows = 4 + Math.min(level, 5);
    const cols = 10;
    const padX = 20, padY = 50;
    const gap = 4;
    const bw = (W - padX*2 - gap*(cols-1)) / cols;
    const bh = 22;
    const colors = ['#FF4D6A', '#FF8A3D', '#FFD93D', '#5DD96A', '#5BD2FF', '#A569E5', '#FF6FA8', '#FFFFFF'];
    // Build a grid of kinds. Default everything to 'normal'.
    const kinds = Array.from({length: rows}, () => Array(cols).fill('normal'));

    // ---- Tough brick clusters (organic blobs) ----
    if (level >= 3) {
      // Number of cluster seeds scales with level. Each seed creates a blob.
      const toughClusters = Math.max(1, level - 2);  // 1, 2, 3, 4, 5 at L3..L7
      for (let i = 0; i < toughClusters; i++) {
        const seedC = Math.floor(Math.random() * cols);
        const seedR = Math.floor(Math.random() * rows);
        const size = 3 + Math.floor(Math.random() * 2);  // 3..4 radius
        for (let dr = -size; dr <= size; dr++) {
          for (let dc = -size; dc <= size; dc++) {
            const r = seedR + dr, c = seedC + dc;
            if (r < 0 || r >= rows || c < 0 || c >= cols) continue;
            // Higher fill probability nearer the seed (manhattan distance).
            const dist = Math.abs(dr) + Math.abs(dc);
            const p = Math.max(0, 1 - dist / (size + 1));
            if (Math.random() < p * 0.85 && kinds[r][c] === 'normal') {
              kinds[r][c] = 'tough';
            }
          }
        }
      }
    }

    // ---- Steel brick lines (rows/columns of armor) ----
    if (level >= 5) {
      const steelLines = level - 4;  // 1, 2, 3 at L5, L6, L7
      for (let i = 0; i < steelLines; i++) {
        const horizontal = Math.random() < 0.5;
        const len = 2 + Math.floor(Math.random() * 3);  // 2..4 segment length
        if (horizontal) {
          const r = Math.floor(Math.random() * rows);
          const startC = Math.floor(Math.random() * Math.max(1, cols - len));
          for (let d = 0; d < len; d++) {
            const c = startC + d;
            if (c < cols) kinds[r][c] = 'steel';
          }
          // Safety: never let a row become impassable (>40% steel in one row).
          let count = kinds[r].filter(k => k === 'steel').length;
          if (count > Math.floor(cols * 0.4)) {
            // Demote excess to tough.
            for (let c = 0; c < cols && count > Math.floor(cols * 0.4); c++) {
              if (kinds[r][c] === 'steel') { kinds[r][c] = 'tough'; count--; }
            }
          }
        } else {
          const c = Math.floor(Math.random() * cols);
          const startR = Math.floor(Math.random() * Math.max(1, rows - len));
          for (let d = 0; d < len; d++) {
            const r = startR + d;
            if (r < rows) kinds[r][c] = 'steel';
          }
        }
      }
    }

    // Build brick objects.
    const bricks = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const kind = kinds[r][c];
        const hp = kind === 'steel' ? 99 : kind === 'tough' ? 2 : 1;
        bricks.push({
          x: padX + c*(bw+gap),
          y: padY + r*(bh+gap),
          w: bw, h: bh,
          color: colors[r % colors.length],
          alive: true,
          kind, hp, maxHp: hp
        });
      }
    }
    return bricks;
  }

  function resetBall() {
    state.ball.x = state.paddleX + paddleW()/2;
    state.ball.y = H - 30 - BALL_R - 1;  // sits ON the paddle (1px gap)
    state.ball.vx = 0;
    state.ball.vy = 0;
    state.ball.stuck = true;
    state.ball.lastPaddleHitTick = 0;
  }
  function loseLife() {
    state.lives--;
    setLives(state.lives);
    if (state.lives <= 0) {
      state.over = true;
      stopChillMusic();
      showEndgame('lose');
    } else {
      resetBall();
    }
  }

  function launchBall() {
    if (!state.ball.stuck) return;
    // Speed curve for 7 levels. Bumped ~20% to feel right at the 60-tick/sec
    // fixed sim rate (some devices were running RAF faster before).
    const speed = 5.3 + (state.level - 1) * 0.55;
    const angle = (-Math.PI/2) + (Math.random()-0.5) * 0.6; // mostly up
    state.ball.vx = Math.cos(angle) * speed;
    state.ball.vy = Math.sin(angle) * speed;
    state.ball.stuck = false;
    state.ball.lastPaddleHitTick = state.activeTicks;
    if (!chillTimer && !state.nozomi.active) startChillMusic();
  }

  function startLevel(n, keepBall) {
    state.level = n;
    state.bricks = buildBricks(n);
    if (!keepBall) resetBall();
    levelEl.textContent = n;
    state.levelStartTick = state.activeTicks;
    state.combo = 0;
    state.levelBrickPoints = 0;
    hideBanner();
  }
  // Time bonus: 100% if cleared in 0s, 0% at 5 minutes, linear in between.
  function computeLevelBonuses() {
    const flat = 1000 * state.level;
    const elapsedSec = (state.activeTicks - state.levelStartTick) / 60;
    const maxSec = 300;  // 5 minutes
    const timeFactor = Math.max(0, 1 - elapsedSec / maxSec);
    const timeBonus = Math.round(flat * timeFactor);
    return { flat, timeBonus };
  }
  function awardLevelClearBonus() {
    const { flat, timeBonus } = computeLevelBonuses();
    state.score += flat + timeBonus;
    setScore(state.score);
  }
  // Called when all non-steel bricks are cleared. Handles bonus, popup, mode cleanup,
  // and win-condition transition for level 7. Safe to call multiple times in a frame
  // (subsequent calls return early thanks to levelTransitioning).
  function triggerLevelClear() {
    if (state.levelTransitioning || state.won) return;
    state.levelTransitioning = true;
    const clearedLevel = state.level;
    const bricksPts = state.levelBrickPoints;
    const { flat, timeBonus } = computeLevelBonuses();
    // Add bonuses to running score and persist hi-score.
    state.score += flat + timeBonus;
    setScore(state.score);
    // End any active modes (level transition is a hard reset point).
    state.nozomi.active = state.madMama.active = state.superKai.active = state.papa.active = state.akhil.active = false;
    stopNozomiMusic(); stopMadMamaMusic(); stopSuperKaiMusic(); stopPapaMusic(); stopAkhilMusic();
    state.fallingItem = null;
    state.extras.length = 0;
    if (clearedLevel < MAX_LEVEL) {
      playLevelJingle();
      showLevelComplete(clearedLevel, bricksPts, flat, timeBonus);
    } else {
      // Beat the whole game!
      state.won = true;
      state.levelTransitioning = false;
      stopChillMusic();
      playWinJingle();
      showEndgame('win');
    }
  }

  // ---------- Falling power-up items ----------
  // Items spawn every SPAWN_INTERVAL_TICKS. Type is randomly chosen with the
  // weights in ITEM_WEIGHTS. Three possible types: 'heart', 'bomb', 'superKai'.
  function spawnFallingItem(type) {
    type = type || pickItemType();
    const x = 40 + Math.random() * (W - 80 - ITEM_W);
    state.fallingItem = {
      type,
      x, startX: x,
      y: -ITEM_H,

  // ---------- Level Complete popup ----------
  const levelCompleteEl  = document.getElementById('level-complete');
  const completeTitleEl  = document.getElementById('complete-title');
  const completeBricksEl = document.getElementById('complete-bricks');
  const completeBonusEl  = document.getElementById('complete-bonus');
  const completeTimeEl   = document.getElementById('complete-time');
  const completeTotalEl  = document.getElementById('complete-total');
  const completeNextBtn  = document.getElementById('complete-next');

  function showLevelComplete(clearedLevel, bricksPts, levelBonus, timeBonus) {
    completeTitleEl.textContent = 'LEVEL ' + clearedLevel + ' COMPLETE!';
    completeBricksEl.textContent = '0';
    completeBonusEl.textContent  = '0';
    completeTimeEl.textContent   = '0';
    completeTotalEl.textContent  = '0';
    completeNextBtn.classList.remove('ready');
    levelCompleteEl.classList.remove('hidden');
    // Animate counts in sequence: bricks → bonus → time → total.
    const total = bricksPts + levelBonus + timeBonus;
    animateNumber(completeBricksEl, 0, bricksPts, 600, () => {
      animateNumber(completeBonusEl, 0, levelBonus, 500, () => {
        animateNumber(completeTimeEl, 0, timeBonus, 500, () => {
          animateNumber(completeTotalEl, 0, total, 700, () => {
            completeNextBtn.classList.add('ready');
          });
        });
      });
    });
  }
  function hideLevelComplete() {
    levelCompleteEl.classList.add('hidden');
  }
  // Smoothly tween a DOM number from->to over `duration` ms, then call `done`.
  // Also plays subtle "tick" blips paced across the animation so the score-roll
  // feels like a slot-machine counter (frequency rises with progress).
  function animateNumber(el, from, to, duration, done) {
    const start = performance.now();
    // Skip ticks entirely for trivial counts so we don't spam audio for tiny values.
    const range = Math.abs(to - from);
    const TICK_COUNT = range < 5 ? 0 : Math.min(12, Math.max(4, Math.round(duration / 70)));
    let nextTickIdx = 0;
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);  // easeOutCubic
      el.textContent = Math.round(from + (to - from) * eased).toString();
      if (TICK_COUNT > 0) {
        while (nextTickIdx < TICK_COUNT && eased >= (nextTickIdx + 1) / TICK_COUNT) {
          playScoreTick((nextTickIdx + 1) / TICK_COUNT);
          nextTickIdx++;
        }
      }
      if (t < 1) requestAnimationFrame(step);
      else if (done) done();
    }
    requestAnimationFrame(step);
  }

  function advanceToNextLevel() {
    if (levelCompleteEl.classList.contains('hidden')) return;
    if (!completeNextBtn.classList.contains('ready')) return;  // wait for animation
    hideLevelComplete();
    // Defensive: fully reset transient state before building the next level.
    state.levelTransitioning = false;
    state.fallingItem = null;
    state.extras.length = 0;
    state.particles.length = 0;
    state.explosionParts.length = 0;
    state.popups.length = 0;
    state.snowHearts.length = 0;
    state.combo = 0;
    state.nozomi.active = state.madMama.active = state.superKai.active = false;
    state.papa.active = state.akhil.active = false;
    state.akhil.target = null;
    state.akhil.bounceTicks = 0;
    state.akhil.rotation = 0;
    state.nozomi.paddlePerim = 0;
    // Center the paddle (might have been off during a PAPA mode that ended).
    state.paddleX = W/2 - paddleW()/2;
    // Reset ball to paddle. Player must press space/click to launch.
    startLevel(state.level + 1);
  }
  completeNextBtn.addEventListener('click', advanceToNextLevel);

  // ---------- Nozomi mode ----------
  function startNozomi() {
    state.nozomi.active = true;
    state.nozomi.endsAtTick = state.activeTicks + NOZOMI_DURATION_TICKS;
    state.nozomi.paddlePerim = 0;
    // If the ball was sitting on the paddle when the powerup was caught, give it
    // a velocity so the 15 seconds of Nozomi mode aren't wasted on a stationary ball.
    if (state.ball.stuck) launchBall();
    playPowerSound();
    flashCanvas('nozomi');
    setTimeout(startNozomiMusic, 200); // start music slightly after the power chime
  }
  function endNozomi() {
    state.nozomi.active = false;
    stopNozomiMusic();
    // Auto-launch the ball at normal speed (no slow grace) — no need to press space.
    state.paddleX = W/2 - paddleW()/2;
    state.ball.x = state.paddleX + paddleW()/2;
    state.ball.y = H - 30 - BALL_R;
    state.ball.stuck = true;
    launchBall();
    scheduleNextSpawn();
  }

  // ---------- MAD MAMA mode ----------
  function startMadMama() {
    state.madMama.active = true;
    state.madMama.endsAtTick = state.activeTicks + MADMAMA_DURATION_TICKS;
    if (state.ball.stuck) launchBall();
    playPowerSound();
    flashCanvas('madmama');

  // ---------- SUPERKAI mode ----------
  function startSuperKai() {
    state.superKai.active = true;
    state.superKai.endsAtTick = state.activeTicks + SUPERKAI_DURATION_TICKS;
    // Launch primary if it was sitting on the paddle.
    if (state.ball.stuck) launchBall();
    state.ball.lastPaddleHitTick = state.activeTicks;
    // Spawn 9 extra balls from the primary's position with varied launch angles.
    const baseSpeed = Math.max(4, Math.hypot(state.ball.vx, state.ball.vy));
    state.extras.length = 0;
    for (let i = 0; i < 9; i++) {
      // Spread angles around upward (-150° to -30° from +x), avoiding straight down
      const angle = -Math.PI + (Math.PI * (i + 1) / 10);
      const jitter = (Math.random() - 0.5) * 0.3;
      state.extras.push({
        x: state.ball.x,
        y: state.ball.y,
        vx: Math.cos(angle + jitter) * baseSpeed,
        vy: Math.sin(angle + jitter) * baseSpeed,
        lastPaddleHitTick: 0,
        fading: false,
        fadeAlpha: 1
      });
    }
    playPowerSound();
    flashCanvas('superKai');
    setTimeout(startSuperKaiMusic, 200);
  }
  // ---------- PAPA mode (long paddle, 30s, blue) ----------
  function startPapa() {
    state.papa.active = true;
    state.papa.endsAtTick = state.activeTicks + PAPA_DURATION_TICKS;
    if (state.ball.stuck) launchBall();
    playPowerSound();
    flashCanvas('papa');
    setTimeout(startPapaMusic, 200);
  }
  function endPapa() {
    state.papa.active = false;
    stopPapaMusic();
    // Snap paddle back inside if it overflowed the canvas while extended.
    state.paddleX = Math.max(0, Math.min(W - paddleW(), state.paddleX));
    scheduleNextSpawn();
  }
  // ---------- AKHIL mode (homing ball, 15s, yellow) ----------
  function startAkhil() {
    state.akhil.active = true;
    state.akhil.endsAtTick = state.activeTicks + AKHIL_DURATION_TICKS;
    state.akhil.rotation = 0;
    state.akhil.target = null;
    state.akhil.bounceTicks = 0;
    if (state.ball.stuck) launchBall();
    playPowerSound();
    flashCanvas('akhil');
    setTimeout(startAkhilMusic, 200);
  }
  function endAkhil() {
    state.akhil.active = false;
    stopAkhilMusic();
    // Renormalize ball velocity to the current level's normal launch speed so
    // the ball doesn't keep flying at AKHIL homing speed.
    const normalSpeed = 4 + (state.level - 1) * 0.4;
    const mag = Math.hypot(state.ball.vx, state.ball.vy) || 1;
    state.ball.vx = (state.ball.vx / mag) * normalSpeed;
    state.ball.vy = (state.ball.vy / mag) * normalSpeed;
    // If somehow the ball is heading purely sideways, nudge it upward.
    if (Math.abs(state.ball.vy) < 1) state.ball.vy = -normalSpeed;
    state.akhil.bounceTicks = 0;
    state.akhil.target = null;
    scheduleNextSpawn();
  }

  // Music: PAPA — friendly upbeat brass/synth pop. Tempo medium.
  let papaMusicTimer = null;
  function startPapaMusic() {
    stopPapaMusic();
    const ctx = ensureAudio();
    if (!ctx) return;
    const tempo = 420; // ~143 BPM
    const bass = [65.41, 65.41, 98.00, 98.00, 87.31, 87.31, 73.42, 73.42];   // C C G G F F D D
    const lead = [261.63, 329.63, 392.00, 329.63, 349.23, 261.63, 293.66, 246.94];
    let beat = 0;
    function pulse() {
      if (!state.papa.active || muted || state.paused || state.over || state.won) return;
      const now = ctx.currentTime;
      // Round kick
      const k = ctx.createOscillator();
      const kg = ctx.createGain();
      k.type = 'sine';
      k.frequency.setValueAtTime(140, now);
      k.frequency.exponentialRampToValueAtTime(50, now + 0.12);
      kg.gain.setValueAtTime(0.28, now);
      kg.gain.exponentialRampToValueAtTime(0.001, now + 0.20);
      k.connect(kg).connect(ctx.destination);
      k.start(now); k.stop(now + 0.22);
      // Bass note
      const b = ctx.createOscillator();
      const bg = ctx.createGain();
      b.type = 'triangle';
      b.frequency.value = bass[beat % bass.length];
      bg.gain.setValueAtTime(0.10, now);
      bg.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      b.connect(bg).connect(ctx.destination);
      b.start(now); b.stop(now + 0.3);
      // Bright lead
      const l = ctx.createOscillator();
      const lg = ctx.createGain();
      l.type = 'square';
      l.frequency.value = lead[beat % lead.length];
      lg.gain.setValueAtTime(0, now);
      lg.gain.linearRampToValueAtTime(0.07, now + 0.005);
      lg.gain.exponentialRampToValueAtTime(0.001, now + 0.20);
      l.connect(lg).connect(ctx.destination);
      l.start(now); l.stop(now + 0.22);
      beat++;
    }
    pulse();
    papaMusicTimer = setInterval(pulse, tempo);
  }
  function stopPapaMusic() {
    if (papaMusicTimer) { clearInterval(papaMusicTimer); papaMusicTimer = null; }
  }

  // Music: AKHIL — mystical/dreamy synth swirl
  let akhilMusicTimer = null;
  function startAkhilMusic() {
    stopAkhilMusic();
    const ctx = ensureAudio();
    if (!ctx) return;
    const tempo = 480;  // slow, dreamy
    const arp = [440.00, 554.37, 659.25, 880.00, 659.25, 554.37, 440.00, 659.25];  // A C# E A E C# A E
    let beat = 0;
    function pulse() {
      if (!state.akhil.active || muted || state.paused || state.over || state.won) return;
      const now = ctx.currentTime;
      // Shimmering bell-like notes
      const tone = ctx.createOscillator();
      const tg = ctx.createGain();
      tone.type = 'sine';
      tone.frequency.value = arp[beat % arp.length];
      tg.gain.setValueAtTime(0, now);
      tg.gain.linearRampToValueAtTime(0.10, now + 0.04);

      tone.connect(tg).connect(ctx.destination);
      tone.start(now); tone.stop(now + 0.5);
      // Octave-up sparkle every other beat
      if (beat % 2 === 0) {
        const sp = ctx.createOscillator();
        const sg = ctx.createGain();
        sp.type = 'triangle';
        sp.frequency.value = arp[beat % arp.length] * 2;
        sg.gain.setValueAtTime(0.06, now);
        sg.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        sp.connect(sg).connect(ctx.destination);
        sp.start(now); sp.stop(now + 0.4);
      }
      // Soft low pad every 4 beats — warmth
      if (beat % 4 === 0) {
        const pad = ctx.createOscillator();
        const pg = ctx.createGain();
        pad.type = 'sine';
        pad.frequency.value = 110;
        pg.gain.setValueAtTime(0, now);
        pg.gain.linearRampToValueAtTime(0.04, now + 0.3);
        pg.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
        pad.connect(pg).connect(ctx.destination);
        pad.start(now); pad.stop(now + 2.1);
      }

    }

  function endSuperKai() {
    state.superKai.active = false;
    stopSuperKaiMusic();
    // Pick the ball with the most recent paddle hit as the new primary.
    // Combined list of "alive" candidates (non-fading extras + primary).
    const candidates = [state.ball, ...state.extras.filter(e => !e.fading)];
    candidates.sort((a, b) => b.lastPaddleHitTick - a.lastPaddleHitTick);
    const winner = candidates[0];
    if (winner !== state.ball) {
      // Move the old primary into extras (will fade) and copy winner's state into primary.
      state.extras.push({
        x: state.ball.x, y: state.ball.y,
        vx: state.ball.vx, vy: state.ball.vy,
        lastPaddleHitTick: state.ball.lastPaddleHitTick,
        fading: true, fadeAlpha: 1
      });
      state.ball.x = winner.x;
      state.ball.y = winner.y;
      state.ball.vx = winner.vx;
      state.ball.vy = winner.vy;
      state.ball.lastPaddleHitTick = winner.lastPaddleHitTick;
      state.ball.stuck = false;
      // Remove winner from extras
      const idx = state.extras.indexOf(winner);
      if (idx >= 0) state.extras.splice(idx, 1);
    }
    // Every remaining extra fades out
    for (const e of state.extras) {
      e.fading = true;
      if (e.fadeAlpha === undefined) e.fadeAlpha = 1;
    }
    scheduleNextSpawn();
  }

  // (autoLaunchSlow removed — Nozomi now ends with a normal-speed launch.)

  // Brief full-canvas color tint when entering a mode.

  function flashCanvas(kind) {
